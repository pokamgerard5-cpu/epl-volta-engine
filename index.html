<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Baccarat IQ · One-Click Recorder & Predictor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0A0C15;
      --surface: #11131F;
      --card: #161A2B;
      --border: #232838;
      --border-glow: #2D3348;
      --text: #E9EDF2;
      --text-dim: #8A94B0;
      --text-muted: #4F5A74;
      --banker: #F97316;
      --banker-soft: #F9731620;
      --player: #38BDF8;
      --player-soft: #38BDF820;
      --tie: #4ADE80;
      --tie-soft: #4ADE8020;
      --win: #22C55E;
      --loss: #EF4444;
      --gold: #FBBF24;
      --success: #10B981;
      --danger: #EF4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, monospace;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
      line-height: 1.4;
    }

    /* Main layout */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 500px;
      margin: 0 auto;
      background: var(--bg);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    /* Header */
    .header {
      background: var(--surface);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 6px;
    }
    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--banker));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo p {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    .quick-stats {
      display: flex;
      gap: 18px;
    }
    .qs {
      text-align: center;
    }
    .qs-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .qs-value {
      font-size: 18px;
      font-weight: 800;
    }
    .positive { color: var(--win); }
    .negative { color: var(--loss); }
    .neutral { color: var(--gold); }

    /* Big prediction card */
    .prediction-area {
      background: var(--surface);
      margin: 12px 16px;
      border-radius: 28px;
      padding: 20px 16px;
      text-align: center;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .prediction-area.call-B { border-color: var(--banker); background: var(--banker-soft); }
    .prediction-area.call-P { border-color: var(--player); background: var(--player-soft); }
    .prediction-area.call-skip { border-color: var(--text-muted); }
    
    .prediction-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .prediction-main {
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      margin: 8px 0;
    }
    .prediction-main.B { color: var(--banker); text-shadow: 0 0 20px var(--banker-soft); }
    .prediction-main.P { color: var(--player); text-shadow: 0 0 20px var(--player-soft); }
    .prediction-main.skip { color: var(--text-dim); font-size: 42px; }
    
    .confidence-bar {
      background: var(--border);
      border-radius: 30px;
      height: 6px;
      margin: 12px 0 8px;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 30px;
      transition: width 0.3s ease;
    }
    .confidence-fill.B { background: linear-gradient(90deg, var(--banker), var(--gold)); }
    .confidence-fill.P { background: linear-gradient(90deg, var(--player), var(--gold)); }
    .confidence-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
    }
    .skip-message {
      font-size: 11px;
      color: var(--danger);
      background: rgba(239,68,68,0.1);
      padding: 6px 12px;
      border-radius: 20px;
      display: inline-block;
      margin-top: 8px;
    }

    /* Signals - horizontal scroll */
    .signals-scroll {
      overflow-x: auto;
      white-space: nowrap;
      padding: 8px 16px;
      gap: 8px;
      display: flex;
      flex-wrap: nowrap;
      scrollbar-width: thin;
    }
    .signal-chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 6px 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .signal-chip.B .pred-badge { color: var(--banker); font-weight: 800; }
    .signal-chip.P .pred-badge { color: var(--player); font-weight: 800; }
    .signal-strength {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .strength-high { background: var(--gold); box-shadow: 0 0 4px var(--gold); }
    .strength-med { background: var(--banker); }
    .strength-low { background: var(--text-muted); }

    /* Big input & bet row */
    .bet-panel {
      background: var(--surface);
      margin: 8px 16px;
      padding: 12px;
      border-radius: 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .bet-input {
      flex: 2;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bet-input span {
      color: var(--gold);
      font-weight: 800;
      font-size: 20px;
    }
    #betAmount {
      background: transparent;
      border: none;
      color: var(--gold);
      font-size: 20px;
      font-weight: 800;
      width: 100%;
      outline: none;
      font-family: monospace;
    }
    .action-btn {
      flex: 1;
      background: var(--gold);
      border: none;
      border-radius: 60px;
      padding: 12px 0;
      font-weight: 800;
      font-size: 14px;
      color: #000;
      cursor: pointer;
      transition: 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .action-btn:active { transform: scale(0.96); }
    .action-btn.secondary {
      background: var(--border);
      color: var(--text-dim);
    }
    .action-btn.danger {
      background: var(--danger);
      color: white;
    }

    /* Result buttons - big and happy */
    .result-row {
      display: flex;
      gap: 10px;
      margin: 8px 16px 12px;
    }
    .result-btn {
      flex: 1;
      padding: 18px 0;
      border-radius: 60px;
      border: none;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.08s linear;
      color: #000;
      font-family: monospace;
    }
    .result-btn:active { transform: scale(0.96); }
    .result-btn:disabled {
      opacity: 0.3;
      transform: none;
      cursor: not-allowed;
    }
    .result-btn.B { background: var(--banker); box-shadow: 0 4px 12px var(--banker-soft); }
    .result-btn.P { background: var(--player); box-shadow: 0 4px 12px var(--player-soft); }
    .result-btn.T { background: var(--tie); box-shadow: 0 4px 12px var(--tie-soft); }

    /* History table - simple, clean */
    .history-section {
      flex: 1;
      overflow-y: auto;
      background: var(--surface);
      margin-top: 8px;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      padding: 0 4px;
    }
    .history-title {
      padding: 12px 16px 4px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .history-table th {
      text-align: left;
      padding: 8px 12px;
      color: var(--text-dim);
      font-weight: 500;
      font-size: 10px;
      border-bottom: 1px solid var(--border);
    }
    .history-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .badge-win { color: var(--win); font-weight: 700; }
    .badge-loss { color: var(--loss); }
    .badge-tie { color: var(--tie); }
    .badge-skip { color: var(--text-muted); }

    /* Toast message */
    #toast {
      position: fixed;
      bottom: 100px;
      left: 20px;
      right: 20px;
      background: var(--card);
      border: 1px solid var(--gold);
      border-radius: 100px;
      padding: 10px 20px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--gold);
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      z-index: 1000;
      backdrop-filter: blur(12px);
    }
    #toast.show { opacity: 1; }

    /* Status indicator */
    .status-badge {
      display: inline-block;
      background: var(--danger);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 9px;
      font-weight: bold;
      margin-left: 10px;
    }
    .footer-note {
      text-align: center;
      font-size: 9px;
      color: var(--text-muted);
      padding: 8px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <h1>🎰 BACCARAT·IQ</h1>
      <p>TAP & RECORD · SMART PREDICTIONS</p>
    </div>
    <div class="quick-stats">
      <div class="qs"><div class="qs-label">HAND</div><div class="qs-value" id="statHand">0</div></div>
      <div class="qs"><div class="qs-label">WIN%</div><div class="qs-value" id="statWr">—</div></div>
      <div class="qs"><div class="qs-label" id="statPnlLabel">P&L</div><div class="qs-value" id="statPnl">$0</div></div>
    </div>
  </div>

  <!-- PREDICTION CARD (touch friendly) -->
  <div class="prediction-area" id="predictionCard">
    <div class="prediction-label" id="predLabel">NEXT HAND</div>
    <div class="prediction-main" id="predMain">—</div>
    <div class="confidence-bar"><div class="confidence-fill" id="confFill" style="width:0%"></div></div>
    <div class="confidence-text" id="confText">—</div>
    <div id="skipMsg" class="skip-message" style="display: none;"></div>
  </div>

  <!-- SIGNALS (scrollable chips, easy to see) -->
  <div class="signals-scroll" id="signalsContainer">
    <div style="color: var(--text-muted); padding: 6px;">Waiting for history...</div>
  </div>

  <!-- BET CONTROLS (big, friendly) -->
  <div class="bet-panel">
    <div class="bet-input">
      <span>$</span>
      <input type="number" id="betAmount" value="25" step="5" min="1">
    </div>
    <button class="action-btn" id="betBtn">🎲 BET</button>
    <button class="action-btn secondary" id="skipBtn">⏭ SKIP</button>
    <button class="action-btn secondary" id="undoBtn" title="Undo last hand">↩ UNDO</button>
  </div>

  <!-- BIG RESULT BUTTONS (very intuitive) -->
  <div class="result-row">
    <button class="result-btn B" id="btnB" disabled>BANKER</button>
    <button class="result-btn P" id="btnP" disabled>PLAYER</button>
    <button class="result-btn T" id="btnT" disabled>TIE</button>
  </div>

  <!-- HISTORY (scrollable, shows last rounds) -->
  <div class="history-section">
    <div class="history-title">📋 RECENT ROUNDS</div>
    <table class="history-table" id="historyTable">
      <thead><tr><th>#</th><th>Result</th><th>Pred</th><th>Bet</th><th>P&L</th></tr></thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
  <div class="footer-note">💡 Tap BANKER / PLAYER / TIE after each round → engine learns & predicts</div>
</div>
<div id="toast"></div>

<script>
  // --------------------------------------------------------------
  //  FRIENDLY BACCARAT ENGINE - ONE CLICK RECORDING
  // --------------------------------------------------------------
  
  // ---- DATA (starts with 8 example hands so it's not empty) ----
  let shoe = ['B', 'P', 'B', 'P', 'B', 'B', 'P', 'T'];
  let bets = [];  // { hand, actual, pred, outcome, bet, pnl }
  
  // ---- UI State ----
  let awaitingResult = false;
  let pendingBet = null;   // { amount, prediction }
  let lastPrediction = null;
  
  // ----- Helper functions ---------------------------------------
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.color = isError ? 'var(--danger)' : 'var(--gold)';
    toast.style.borderColor = isError ? 'var(--danger)' : 'var(--gold)';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
  
  function formatMoney(n) {
    return (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2);
  }
  
  function getNonTie(arr) {
    return arr.filter(r => r !== 'T');
  }
  
  // ----- PREDICTION ENGINE (simplified but sharp) --------------
  function getStreakInfo(arr) {
    const nt = getNonTie(arr);
    if (nt.length === 0) return { side: 'B', count: 0 };
    const last = nt[nt.length - 1];
    let cnt = 0;
    for (let i = nt.length - 1; i >= 0 && nt[i] === last; i--) cnt++;
    return { side: last, count: cnt };
  }
  
  function isAlternating(arr, depth) {
    const nt = getNonTie(arr);
    if (nt.length < depth) return false;
    const seg = nt.slice(-depth);
    for (let i = 1; i < depth; i++) if (seg[i] === seg[i-1]) return false;
    return true;
  }
  
  function consecutiveTies(arr) {
    let c = 0;
    for (let i = arr.length-1; i >= 0 && arr[i] === 'T'; i--) c++;
    return c;
  }
  
  function tieDensity(arr, windowSize = 5) {
    const recent = arr.slice(-windowSize);
    const ties = recent.filter(r => r === 'T').length;
    return ties / windowSize;
  }
  
  function predictOutcome() {
    const nt = getNonTie(shoe);
    const cTies = consecutiveTies(shoe);
    const tieDens = tieDensity(shoe, 6);
    
    // Hard skip conditions (user friendly)
    if (nt.length < 4) {
      return { skip: true, reason: `Need ${4-nt.length} more non‑tie rounds`, signals: [] };
    }
    if (cTies >= 2) {
      return { skip: true, reason: `⚠️ ${cTies} ties in a row — wait`, signals: [] };
    }
    if (tieDens > 0.45) {
      return { skip: true, reason: `⚠️ High tie activity (${Math.round(tieDens*100)}%)`, signals: [] };
    }
    
    const streak = getStreakInfo(shoe);
    const signals = [];
    
    // Signal 1: streak momentum
    if (streak.count >= 4) signals.push({ name: `🔥 STREAK x${streak.count}`, pred: streak.side, weight: 0.54, strength: 'high' });
    else if (streak.count === 3) signals.push({ name: `Streak x3`, pred: streak.side, weight: 0.42, strength: 'high' });
    else if (streak.count === 2) signals.push({ name: `Double streak`, pred: streak.side, weight: 0.30, strength: 'med' });
    else signals.push({ name: `Last result`, pred: streak.side, weight: 0.18, strength: 'low' });
    
    // Signal 2: Alternating pattern
    if (isAlternating(shoe, 5)) {
      const lastNT = nt[nt.length-1];
      const next = lastNT === 'B' ? 'P' : 'B';
      signals.push({ name: `✨ Alternating ×5`, pred: next, weight: 0.56, strength: 'high' });
    } else if (isAlternating(shoe, 3)) {
      const lastNT = nt[nt.length-1];
      const next = lastNT === 'B' ? 'P' : 'B';
      signals.push({ name: `Alternating pattern`, pred: next, weight: 0.32, strength: 'med' });
    }
    
    // Signal 3: simple bigram (last 2 non-tie)
    if (nt.length >= 2) {
      const lastTwo = nt.slice(-2).join('');
      const freq = { B: 0, P: 0 };
      for (let i = 0; i < nt.length - 2; i++) {
        if (nt[i] + nt[i+1] === lastTwo && nt[i+2] && nt[i+2] !== 'T') {
          freq[nt[i+2]]++;
        }
      }
      const total = freq.B + freq.P;
      if (total >= 2) {
        const best = freq.B > freq.P ? 'B' : 'P';
        const ratio = Math.max(freq.B, freq.P) / total;
        if (ratio > 0.65) {
          signals.push({ name: `📊 Pattern ${lastTwo}→${best}`, pred: best, weight: ratio * 0.48, strength: 'high' });
        }
      }
    }
    
    // Signal 4: post tie small lean
    if (shoe[shoe.length-1] === 'T' && cTies === 1) {
      signals.push({ name: `Post-tie banker lean`, pred: 'B', weight: 0.12, strength: 'low' });
    }
    
    // Signal 5: banker base edge
    signals.push({ name: `Banker edge (5% vig)`, pred: 'B', weight: 0.08, strength: 'low' });
    
    // AGGREGATE
    let bScore = 0, pScore = 0;
    for (const s of signals) {
      if (s.pred === 'B') bScore += s.weight;
      else pScore += s.weight;
    }
    const totalWeight = bScore + pScore;
    if (totalWeight === 0) return { skip: true, reason: 'No signals', signals: [] };
    
    const prediction = bScore >= pScore ? 'B' : 'P';
    let confidence = Math.round((Math.max(bScore, pScore) / totalWeight) * 100);
    confidence = Math.min(98, Math.max(52, confidence));
    
    const threshold = 56 + (tieDens * 10);
    if (confidence < threshold) {
      return { skip: true, reason: `Low confidence ${confidence}% < ${Math.round(threshold)}%`, signals };
    }
    
    return { skip: false, prediction, confidence, signals, bScore, pScore };
  }
  
  // ----- RENDER ALL UI (super friendly) -----
  function updateAll() {
    const pred = predictOutcome();
    lastPrediction = pred;
    
    // Update prediction card
    const card = document.getElementById('predictionCard');
    const predMain = document.getElementById('predMain');
    const predLabel = document.getElementById('predLabel');
    const confFill = document.getElementById('confFill');
    const confText = document.getElementById('confText');
    const skipMsgDiv = document.getElementById('skipMsg');
    
    if (pred.skip) {
      card.className = 'prediction-area call-skip';
      predMain.className = 'prediction-main skip';
      predMain.textContent = 'SKIP';
      predLabel.textContent = '⏸ ENGINE RECOMMENDS SKIP';
      confFill.style.width = '0%';
      confText.textContent = '—';
      skipMsgDiv.style.display = 'block';
      skipMsgDiv.textContent = pred.reason;
    } else {
      card.className = `prediction-area call-${pred.prediction}`;
      predMain.className = `prediction-main ${pred.prediction}`;
      predMain.textContent = pred.prediction;
      predLabel.textContent = `🎯 NEXT PREDICTION`;
      confFill.style.width = `${pred.confidence}%`;
      confFill.className = `confidence-fill ${pred.prediction}`;
      confText.textContent = `Confidence ${pred.confidence}%`;
      skipMsgDiv.style.display = 'none';
    }
    
    // Signals (scrollable chips)
    const signalsContainer = document.getElementById('signalsContainer');
    if (pred.signals && pred.signals.length) {
      signalsContainer.innerHTML = pred.signals.map(s => {
        const strengthClass = s.strength === 'high' ? 'strength-high' : (s.strength === 'med' ? 'strength-med' : 'strength-low');
        return `<div class="signal-chip ${s.pred}">
                  <span class="signal-strength ${strengthClass}"></span>
                  <span>${s.name}</span>
                  <span class="pred-badge">→ ${s.pred}</span>
                </div>`;
      }).join('');
    } else {
      signalsContainer.innerHTML = '<div style="color: var(--text-muted); padding: 6px;">📡 No strong signals yet</div>';
    }
    
    // Statistics update
    const totalBets = bets.length;
    const wins = bets.filter(b => b.outcome === 'win').length;
    const losses = bets.filter(b => b.outcome === 'loss').length;
    const ties = bets.filter(b => b.outcome === 'tie_loss').length;
    const winRate = totalBets ? ((wins / totalBets) * 100).toFixed(1) : 0;
    const netPnl = bets.reduce((s, b) => s + b.pnl, 0);
    
    document.getElementById('statHand').textContent = shoe.length;
    const wrElem = document.getElementById('statWr');
    wrElem.textContent = totalBets ? winRate + '%' : '—';
    wrElem.className = `qs-value ${winRate >= 45 ? 'positive' : 'negative'}`;
    const pnlElem = document.getElementById('statPnl');
    pnlElem.textContent = formatMoney(netPnl);
    pnlElem.className = `qs-value ${netPnl >= 0 ? 'positive' : 'negative'}`;
    
    // history table (last 12 rounds, newest on top)
    const tbody = document.getElementById('historyBody');
    const start = Math.max(0, shoe.length - 20);
    let html = '';
    for (let i = shoe.length - 1; i >= start; i--) {
      const handNum = i + 1;
      const outcome = shoe[i];
      const bet = bets.find(b => b.hand === handNum);
      if (bet) {
        const outcomeClass = bet.outcome === 'win' ? 'badge-win' : (bet.outcome === 'tie_loss' ? 'badge-tie' : 'badge-loss');
        const outcomeText = bet.outcome === 'win' ? 'WIN' : (bet.outcome === 'tie_loss' ? 'TIE=L' : 'LOSS');
        html += `<tr>
          <td style="color:var(--text-dim)">#${handNum}</td>
          <td class="${outcome === 'B' ? 'B' : outcome === 'P' ? 'P' : 'T'}" style="font-weight:800;">${outcome}</td>
          <td style="color:${bet.pred === 'B' ? 'var(--banker)' : 'var(--player)'}">${bet.pred}</td>
          <td>$${bet.bet.toFixed(0)}</td>
          <td class="${bet.pnl >= 0 ? 'badge-win' : 'badge-loss'}">${formatMoney(bet.pnl)}</td>
        </tr>`;
      } else {
        html += `<tr>
          <td style="color:var(--text-muted)">#${handNum}</td>
          <td class="${outcome === 'B' ? 'B' : outcome === 'P' ? 'P' : 'T'}" style="font-weight:800;">${outcome}</td>
          <td class="badge-skip">—</td>
          <td class="badge-skip">—</td>
          <td class="badge-skip">$0</td>
        </tr>`;
      }
    }
    tbody.innerHTML = html;
  }
  
  // ----- RECORD RESULT (the core action) -----
  function recordResult(actual) {
    if (!awaitingResult) {
      showToast("⚠️ No active bet or skip. Press BET or SKIP first.", true);
      return;
    }
    
    const handNum = shoe.length + 1;
    shoe.push(actual);
    
    if (pendingBet) {
      let outcome, pnl;
      if (actual === 'T') {
        outcome = 'tie_loss';
        pnl = -pendingBet.amount;
      } else if (actual === pendingBet.prediction) {
        outcome = 'win';
        pnl = pendingBet.prediction === 'B' ? pendingBet.amount * 0.95 : pendingBet.amount;
      } else {
        outcome = 'loss';
        pnl = -pendingBet.amount;
      }
      
      const betRecord = {
        hand: handNum,
        actual: actual,
        pred: pendingBet.prediction,
        outcome: outcome,
        bet: pendingBet.amount,
        pnl: pnl
      };
      bets.push(betRecord);
      
      // friendly toast
      if (outcome === 'win') showToast(`🎉 WIN! +${formatMoney(pnl)}`, false);
      else if (outcome === 'tie_loss') showToast(`⚖️ TIE → loss ${formatMoney(pnl)}`, false);
      else showToast(`❌ LOSS ${formatMoney(pnl)}`, true);
      
      pendingBet = null;
    } else {
      // skip hand
      showToast(`⏭ Hand #${handNum} recorded as ${actual} (no bet)`, false);
    }
    
    awaitingResult = false;
    
    // reset UI controls
    document.getElementById('betBtn').disabled = false;
    document.getElementById('skipBtn').disabled = false;
    document.getElementById('btnB').disabled = true;
    document.getElementById('btnP').disabled = true;
    document.getElementById('btnT').disabled = true;
    document.getElementById('betBtn').textContent = '🎲 BET';
    document.getElementById('betBtn').style.background = 'var(--gold)';
    
    // refresh everything
    updateAll();
    
    // auto scroll bead road (optional: just update)
    const container = document.querySelector('.signals-scroll');
    if (container) container.scrollLeft = container.scrollWidth;
  }
  
  // ----- BET ACTION -----
  function placeBet() {
    if (awaitingResult) {
      showToast("Wait for result to be entered first", true);
      return;
    }
    const amount = parseFloat(document.getElementById('betAmount').value);
    if (isNaN(amount) || amount <= 0) {
      showToast("Enter valid bet amount", true);
      return;
    }
    
    const pred = lastPrediction && !lastPrediction.skip ? lastPrediction.prediction : 'B';
    pendingBet = { amount: amount, prediction: pred };
    awaitingResult = true;
    
    // enable result buttons
    document.getElementById('btnB').disabled = false;
    document.getElementById('btnP').disabled = false;
    document.getElementById('btnT').disabled = false;
    document.getElementById('betBtn').disabled = true;
    document.getElementById('skipBtn').disabled = true;
    document.getElementById('betBtn').textContent = `⚡ LIVE $${amount}`;
    document.getElementById('betBtn').style.background = 'var(--success)';
    
    showToast(`✅ BET $${amount} on ${pred === 'B' ? 'BANKER' : 'PLAYER'} — now tap actual result`, false);
  }
  
  function skipHand() {
    if (awaitingResult) {
      showToast("Already waiting for result", true);
      return;
    }
    pendingBet = null;
    awaitingResult = true;
    document.getElementById('btnB').disabled = false;
    document.getElementById('btnP').disabled = false;
    document.getElementById('btnT').disabled = false;
    document.getElementById('betBtn').disabled = true;
    document.getElementById('skipBtn').disabled = true;
    document.getElementById('betBtn').textContent = '⏸ SKIP MODE';
    showToast("⏭ Skipping — tap actual result (no bet)", false);
  }
  
  function undoLast() {
    if (awaitingResult) {
      showToast("Cannot undo while waiting for result", true);
      return;
    }
    if (shoe.length === 0) return;
    const lastHand = shoe.length;
    shoe.pop();
    const betIndex = bets.findIndex(b => b.hand === lastHand);
    if (betIndex !== -1) bets.splice(betIndex, 1);
    showToast(`↩ Undone hand #${lastHand}`, false);
    updateAll();
  }
  
  // reset UI after result
  function afterResultCleanup() {
    if (!awaitingResult) {
      document.getElementById('btnB').disabled = true;
      document.getElementById('btnP').disabled = true;
      document.getElementById('btnT').disabled = true;
      document.getElementById('betBtn').disabled = false;
      document.getElementById('skipBtn').disabled = false;
      document.getElementById('betBtn').textContent = '🎲 BET';
      document.getElementById('betBtn').style.background = 'var(--gold)';
    }
  }
  
  // Bind events (clean, no inline html)
  function bindEvents() {
    document.getElementById('betBtn').onclick = placeBet;
    document.getElementById('skipBtn').onclick = skipHand;
    document.getElementById('undoBtn').onclick = undoLast;
    document.getElementById('btnB').onclick = () => recordResult('B');
    document.getElementById('btnP').onclick = () => recordResult('P');
    document.getElementById('btnT').onclick = () => recordResult('T');
    
    // Allow enter on bet input
    document.getElementById('betAmount').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') placeBet();
    });
  }
  
  // INIT
  function init() {
    bindEvents();
    updateAll();
    afterResultCleanup();
    showToast("✨ Ready! Tap BET or SKIP, then record result", false);
  }
  
  init();
</script>
</body>
</html>
