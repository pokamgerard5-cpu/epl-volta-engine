<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#060911">
<title>EPL 4v4 · VOLTA ENGINE v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060911;--bg2:#0b0e1b;--sur:#101422;--sur2:#151929;
  --bdr:#1c2238;--bdr2:#263050;
  --grn:#00e87a;--orn:#ff7043;--blu:#29b6f6;--yel:#ffd54f;
  --red:#ff5252;--txt:#dce4f5;--mut:#4a5878;
  --fh:'Barlow Condensed',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --fb:'Inter',sans-serif;
  --nav-h:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--fb);font-size:14px;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 40% at 20% 10%,rgba(0,232,122,.03),transparent 60%),radial-gradient(ellipse 60% 50% at 85% 90%,rgba(41,182,246,.02),transparent 60%),repeating-linear-gradient(rgba(0,232,122,.006) 0,transparent 1px,transparent 44px),repeating-linear-gradient(90deg,rgba(0,232,122,.006) 0,transparent 1px,transparent 44px)}
#app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;padding-bottom:var(--nav-h)}
.page{display:none;flex:1;animation:fadeIn .2s ease}
.page.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,9,17,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;height:var(--nav-h)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--mut);cursor:pointer;font-family:var(--fm);font-size:7px;letter-spacing:1.8px;text-transform:uppercase;transition:all .2s;position:relative}
.nav-btn:active{transform:scale(.96)}
.nav-btn.on{color:var(--grn)}
.nav-btn.on::after{content:'';position:absolute;top:0;left:30%;right:30%;height:2px;background:var(--grn);border-radius:0 0 2px 2px;box-shadow:0 0 12px rgba(0,232,122,.5)}
.nav-btn svg{width:19px;height:19px;stroke-width:1.6}
.hdr{padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10;background:var(--bg)}
.hdr-l .ht{font-family:var(--fh);font-size:32px;font-weight:900;letter-spacing:2px;line-height:1}
.hdr-l .hs{font-family:var(--fm);font-size:8px;color:var(--grn);letter-spacing:2.5px;margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:5px;font-family:var(--fm);font-size:7.5px;letter-spacing:1px;font-weight:600;text-transform:uppercase;border:1px solid transparent;gap:4px}
.bg{background:rgba(74,88,120,.1);color:var(--mut);border-color:rgba(74,88,120,.2)}
.bg-g{background:rgba(0,232,122,.08);color:var(--grn);border-color:rgba(0,232,122,.2)}
.bg-o{background:rgba(255,112,67,.08);color:var(--orn);border-color:rgba(255,112,67,.2)}
.bg-b{background:rgba(41,182,246,.08);color:var(--blu);border-color:rgba(41,182,246,.2)}
.bg-y{background:rgba(255,213,79,.08);color:var(--yel);border-color:rgba(255,213,79,.2)}
.bg-r{background:rgba(255,82,82,.08);color:var(--red);border-color:rgba(255,82,82,.2)}
.sec{padding:14px 16px;max-width:600px;margin:0 auto;width:100%}
.sl{font-family:var(--fm);font-size:8.5px;letter-spacing:2px;color:var(--mut);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sl::after{content:'';flex:1;height:1px;background:var(--bdr)}
.arena{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;margin-bottom:14px}
.arena-grid{display:grid;grid-template-columns:1fr 52px 1fr;align-items:center;padding:20px 16px}
.team-side{display:flex;flex-direction:column;align-items:center;gap:10px}
.team-btn{width:72px;height:72px;border-radius:16px;border:2px solid var(--bdr2);background:var(--sur2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;gap:2px}
.team-btn:active{transform:scale(.94)}
.team-btn:hover:not(:active){border-color:var(--grn)}
.team-btn.sel{border-color:var(--grn);box-shadow:0 0 24px rgba(0,232,122,.12)}
.tb-emoji{font-size:26px;line-height:1}
.tb-abbr{font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:1px;color:var(--mut)}
.team-btn.sel .tb-abbr{color:var(--grn)}
.tn{font-family:var(--fh);font-size:14px;font-weight:700;text-align:center;max-width:100px;line-height:1.2}
.tn.placeholder{color:var(--mut);font-size:10px;font-family:var(--fm);font-weight:400}
.vs-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.vs-div{width:1px;height:20px;background:var(--bdr)}
.vs-txt{font-family:var(--fh);font-size:36px;font-weight:900;color:var(--bdr2)}
.pred-btn{width:100%;height:56px;border:none;border-radius:14px;cursor:pointer;font-family:var(--fh);font-size:24px;font-weight:900;letter-spacing:3px;background:var(--grn);color:#060911;transition:all .2s}
.pred-btn:active{transform:scale(.98)}
.pred-btn:disabled{opacity:.4;cursor:not-allowed}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:var(--fh);font-weight:700;letter-spacing:1px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-sm{padding:8px 16px;font-size:11px}
.btn-g{background:var(--grn);color:#060911}
.btn-ghost{background:var(--sur2);color:var(--txt);border:1px solid var(--bdr2)}
.btn-r{background:rgba(255,82,82,.08);color:var(--red);border:1px solid rgba(255,82,82,.2)}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(6,9,17,.9);backdrop-filter:blur(12px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.on{opacity:1;pointer-events:auto}
.sheet{width:100%;max-height:78vh;background:var(--bg2);border-top:1px solid var(--bdr);border-radius:22px 22px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-header{padding:16px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sheet-title{font-family:var(--fh);font-size:24px;font-weight:700}
.sheet-close{width:34px;height:34px;border:1px solid var(--bdr2);border-radius:50%;background:none;color:var(--mut);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.sheet-search{padding:12px 18px;background:var(--sur2);border:none;border-bottom:1px solid var(--bdr);color:var(--txt);font-family:var(--fb);font-size:15px;outline:none;width:100%}
.sheet-list{overflow-y:auto;flex:1}
.picker-item{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--bdr);cursor:pointer}
.picker-item:active{background:var(--sur)}
.picker-item.selected{background:rgba(0,232,122,.05)}
.picker-badge{width:48px;height:48px;border-radius:11px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bdr2);flex-shrink:0;font-size:22px}
.picker-name{font-family:var(--fh);font-size:19px;font-weight:700}
.picker-sub{font-family:var(--fm);font-size:8.5px;color:var(--mut);letter-spacing:1px;margin-top:2px}
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(6,9,17,.94);backdrop-filter:blur(10px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.on{opacity:1;pointer-events:auto}
.modal-sheet{width:100%;background:var(--bg2);border-top:1px solid var(--bdr);border-radius:22px 22px 0 0;padding:20px 18px 34px;animation:slideUp .25s ease}
.modal-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 14px}
.modal-section{margin-bottom:14px}
.modal-scores{display:grid;grid-template-columns:1fr 28px 1fr;align-items:center;gap:12px}
.score-input{background:var(--sur);border:1px solid var(--bdr2);border-radius:9px;padding:12px;font-family:var(--fh);font-size:28px;font-weight:900;color:var(--txt);text-align:center;outline:none;width:100%}
.modal-actions{display:flex;gap:8px;margin-top:6px}
.modal-actions .btn{flex:1;height:48px;font-size:15px}
.sb{background:var(--bg);border:1px solid var(--bdr);border-radius:14px;padding:20px 16px;margin-bottom:12px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.sb-side{display:flex;flex-direction:column;gap:4px}
.sb-side.right{align-items:flex-end;text-align:right}
.sb-club{font-family:var(--fh);font-size:11px;color:var(--mut)}
.sb-name{font-family:var(--fh);font-size:20px;font-weight:900}
.sb-center{text-align:center}
.sb-ft{font-family:var(--fh);font-size:52px;font-weight:900;color:var(--grn);letter-spacing:-2px;line-height:1}
.sb-label{font-family:var(--fm);font-size:7px;color:var(--mut);letter-spacing:2px;margin-top:2px}
.sb-ht-info{font-family:var(--fm);font-size:10px;color:var(--mut);margin-top:4px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:13px;margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.card-title{font-family:var(--fh);font-size:13px;font-weight:700}
.card-body{padding:14px}
.prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.prof-card{background:var(--sur2);border:1px solid var(--bdr);border-radius:11px;padding:12px}
.prof-row{margin-bottom:8px}
.prof-lbl{font-family:var(--fm);font-size:7.5px;color:var(--mut);letter-spacing:1px;margin-bottom:4px;display:flex;justify-content:space-between}
.prof-bar{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.prof-fill{height:100%;border-radius:2px}
.t3-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.t3-item{background:var(--sur2);border:1px solid var(--bdr);border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.t3-item.win{border-color:rgba(0,232,122,.2);background:rgba(0,232,122,.03)}
.t3-rank{font-size:18px;width:24px;flex-shrink:0;text-align:center}
.t3-score{font-family:var(--fh);font-size:30px;font-weight:900;flex:1}
.t3-item.win .t3-score{color:var(--grn)}
.bet-card{background:var(--sur2);border:1px solid var(--bdr);border-radius:13px;padding:14px;margin-bottom:12px}
.bet-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;gap:10px}
.bet-line{font-family:var(--fh);font-size:36px;font-weight:900;line-height:1}
.bet-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.bet-item{background:var(--bg);border-radius:9px;padding:9px 10px}
.bet-item-label{font-family:var(--fm);font-size:7px;letter-spacing:1.5px;color:var(--mut);margin-bottom:5px}
.bet-item-value{font-family:var(--fm);font-size:12px;font-weight:600}
.conf-card{background:var(--sur2);border:1px solid var(--bdr);border-radius:13px;padding:14px;margin-bottom:12px}
.conf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.conf-pct{font-family:var(--fh);font-size:48px;font-weight:900;line-height:1}
.conf-bar-wrap{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:10px}
.conf-bar{height:100%;border-radius:3px}
.save-bar{background:var(--sur);border:1px solid var(--bdr);border-radius:11px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ft-reasoning-block{background:var(--bg);border-radius:9px;padding:9px 11px;font-family:var(--fm);font-size:9px;color:var(--txt);line-height:1.8;margin-top:10px;border-left:2px solid var(--grn)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:14px 12px}
.stat-value{font-family:var(--fh);font-size:36px;font-weight:900}
.stat-label{font-family:var(--fm);font-size:7px;letter-spacing:2px;color:var(--mut);margin-top:5px}
.ou-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.ou-box{background:var(--sur);border:1px solid var(--bdr);border-radius:9px;padding:8px 10px;min-width:70px;flex:1}
.history-item{background:var(--sur);border:1px solid var(--bdr);border-radius:11px;padding:12px 14px;margin-bottom:8px}
.pending-card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:12px}
.empty-icon{font-size:40px;opacity:.15}
.empty-text{font-family:var(--fm);font-size:10px;color:var(--mut);text-align:center}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--sur2);border:1px solid var(--bdr2);border-radius:10px;padding:10px 20px;font-family:var(--fm);font-size:10px;z-index:500;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}
.w-full{width:100%}
.flex{display:flex}
.flex-wrap{flex-wrap:wrap}
.gap-6{gap:6px}
</style>
</head>
<body>
<div id="app">

<div class="overlay" id="pickerOverlay" onclick="if(event.target===this)closePicker()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-header">
      <div class="sheet-title">SELECT <span id="pickerSideLabel" style="color:var(--grn)">HOME</span></div>
      <button class="sheet-close" onclick="closePicker()">✕</button>
    </div>
    <input class="sheet-search" id="pickerSearch" placeholder="Search teams..." oninput="filterPicker()">
    <div class="sheet-list" id="pickerList"></div>
  </div>
</div>

<div class="modal-overlay" id="resultModal" onclick="if(event.target===this)closeResultModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="card-title" style="font-size:22px;margin-bottom:4px" id="modalTitle">ENTER RESULT</div>
    <div style="font-family:var(--fm);font-size:9px;color:var(--mut);margin-bottom:16px" id="modalSubtitle">ACTUAL SCORE</div>
    <div class="modal-section">
      <div style="font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--mut);margin-bottom:8px">FULL TIME</div>
      <div class="modal-scores">
        <div><div style="font-family:var(--fm);font-size:8px;color:var(--mut)" id="ftALabel">HOME</div><input class="score-input" type="number" id="ftA" min="0" max="99" placeholder="0" inputmode="numeric"></div>
        <div style="font-family:var(--fh);font-size:24px;color:var(--mut);text-align:center">–</div>
        <div><div style="font-family:var(--fm);font-size:8px;color:var(--mut)" id="ftBLabel">AWAY</div><input class="score-input" type="number" id="ftB" min="0" max="99" placeholder="0" inputmode="numeric"></div>
      </div>
    </div>
    <div class="modal-section">
      <div style="font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--mut);margin-bottom:8px">HALF TIME (OPTIONAL)</div>
      <div class="modal-scores">
        <input class="score-input" type="number" id="htA" min="0" max="50" placeholder="—" style="font-size:22px" inputmode="numeric">
        <div style="font-family:var(--fh);font-size:24px;color:var(--mut);text-align:center">–</div>
        <input class="score-input" type="number" id="htB" min="0" max="50" placeholder="—" style="font-size:22px" inputmode="numeric">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:1;height:48px;font-size:15px" onclick="closeResultModal()">CANCEL</button>
      <button class="btn btn-g" style="flex:1;height:48px;font-size:15px" onclick="saveResultEntry()">SAVE</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="page on" id="page-predict">
  <div class="hdr">
    <div class="hdr-l"><div class="ht">EPL 4v4</div><div class="hs">DATA-DRIVEN ENGINE</div></div>
    <span class="badge bg-g" id="miniBadge">0 MATCHES</span>
  </div>
  <div class="sec">
    <div class="arena">
      <div class="arena-grid">
        <div class="team-side">
          <button class="team-btn" id="btnA" onclick="openPicker('A')"><span class="tb-emoji" id="emojiA">⚽</span><span class="tb-abbr" id="abbrA">HOME</span></button>
          <div class="tn placeholder" id="nameA">TAP TO SELECT</div>
        </div>
        <div class="vs-col"><div class="vs-div"></div><div class="vs-txt">VS</div><div class="vs-div"></div></div>
        <div class="team-side">
          <button class="team-btn" id="btnB" onclick="openPicker('B')"><span class="tb-emoji" id="emojiB">⚽</span><span class="tb-abbr" id="abbrB">AWAY</span></button>
          <div class="tn placeholder" id="nameB">TAP TO SELECT</div>
        </div>
      </div>
    </div>
    <button class="pred-btn" id="predictBtn" onclick="runPrediction()">GENERATE PREDICTION</button>
  </div>
  <div class="sec" id="predictionSection" style="display:none">
    <div class="sl">ENGINE OUTPUT</div>
    <div id="predictionOutput"></div>
  </div>
</div>

<div class="page" id="page-results">
  <div class="hdr"><div class="hdr-l"><div class="ht">RESULTS</div><div class="hs">TRACKING</div></div><span class="badge bg-y" id="pendingBadge">0 PENDING</span></div>
  <div class="sec"><div class="sl">PENDING</div><div id="pendingList"></div><div class="sl">COMPLETED</div><div id="completedList"></div></div>
</div>

<div class="page" id="page-db">
  <div class="hdr"><div class="hdr-l"><div class="ht">DATABASE</div><div class="hs">INTELLIGENCE</div></div><span class="badge bg-g" id="totalBadge">0 MATCHES</span></div>
  <div class="sec"><div class="sl">GLOBAL STATS</div><div class="stat-grid" id="globalStats"></div><div class="sl">OVER / UNDER</div><div class="ou-grid" id="ouGrid"></div><div class="sl">TEAM AVERAGES</div><div id="teamAverages"></div><div class="sl">HISTORY</div><div id="historyList"></div></div>
</div>

<nav>
  <button class="nav-btn on" id="nav-predict" onclick="switchPage('predict')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round"/></svg>PREDICT</button>
  <button class="nav-btn" id="nav-results" onclick="switchPage('results')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-linecap="round"/></svg>RESULTS</button>
  <button class="nav-btn" id="nav-db" onclick="switchPage('db')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" stroke-linecap="round"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" stroke-linecap="round"/></svg>DATABASE</button>
</nav>
</div>

<script>
"use strict";

// ═══════════════════════════════════════
// TEAMS
// ═══════════════════════════════════════
const TEAMS = Object.freeze([
  {name:'Arsenal',emoji:'🔴',color:'#EF0107',abbr:'ARS'},
  {name:'AstonVilla',emoji:'🟣',color:'#95BFE5',abbr:'AVL'},
  {name:'Bournemouth',emoji:'🍒',color:'#DA291C',abbr:'BOU'},
  {name:'Brentford',emoji:'🐝',color:'#FFD700',abbr:'BRE'},
  {name:'Brighton',emoji:'🔵',color:'#0057B8',abbr:'BHA'},
  {name:'Burnley',emoji:'🟤',color:'#6C1D45',abbr:'BUR'},
  {name:'Chelsea',emoji:'💙',color:'#034694',abbr:'CHE'},
  {name:'CrystalPalace',emoji:'🦅',color:'#1B458F',abbr:'CRY'},
  {name:'Everton',emoji:'🔵',color:'#003399',abbr:'EVE'},
  {name:'Fulham',emoji:'⚫',color:'#CC0000',abbr:'FUL'},

const avg=arr=>arr.length?arr.reduce((s,v)=>s+v,0)/arr.length:0;
const stdDev=arr=>{if(arr.length<2)return 0;const m=avg(arr);return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/arr.length)};
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const parseScore=s=>{try{const[a,b]=String(s).split('-').map(Number);if(isNaN(a)||isNaN(b))return null;return{a,b,total:a+b}}catch{return null}};
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);

const DB_KEY='epl4v4:v3:matches';

function addMatch(m){const db=loadDB();db.unshift(m);if(saveDB(db))refreshCounters()}
function updateMatch(id,u){const db=loadDB();const i=db.findIndex(m=>m.id===id);if(i>=0){db[i]={...db[i],...u};saveDB(db);refreshCounters()}}
function deleteMatch(id){const db=loadDB();saveDB(db.filter(m=>m.id!==id));refreshCounters()}

          }
        });

// PREDICTION ENGINE

function buildTeamProfile(teamName,allMatches){
  const wr=allMatches.filter(m=>m.ftActual);
  const scored=[],conceded=[],totals=[],allScores=[];
  wr.forEach(m=>{
    const g=parseScore(m.ftActual);if(!g)return;
    if(m.teamA===teamName){scored.push(g.a);conceded.push(g.b);totals.push(g.total);allScores.push({s:g.a,c:g.b})}
    if(m.teamB===teamName){scored.push(g.b);conceded.push(g.a);totals.push(g.total);allScores.push({s:g.b,c:g.a})}
  });
  const n=scored.length;
  if(!n)return{games:0,avgScored:0,avgConceded:0,avgTotal:0,stdScored:0,stdConceded:0,cvScored:1,cvConceded:1,attack:'medium',defense:'medium weakness',style:'balanced',trend:'→ stable',consistency:'unknown',defReliability:'unknown',formMult:1,defFormMult:1};
  const avgSc=avg(scored),avgCn=avg(conceded),avgTot=avg(totals);
  const stdSc=stdDev(scored),stdCn=stdDev(conceded);
  const cvSc=avgSc>0?stdSc/avgSc:1,cvCn=avgCn>0?stdCn/avgCn:1;
  const attack=avgSc>=5?'elite':avgSc>=3.5?'high':avgSc>=2?'medium':'low';
  const defense=avgCn>=5?'high weakness':avgCn>=3?'medium weakness':'low weakness';
  const style=stdSc>2.5?'chaotic':stdSc>1.5?'aggressive':'balanced';
  const last5=allScores.slice(-5);
  const recentAvg=last5.length?avg(last5.map(s=>s.s)):avgSc;
  const recentCn=last5.length?avg(last5.map(s=>s.c)):avgCn;
  const formMult=recentAvg>avgSc+.5?1.1:recentAvg<avgSc-.5?0.9:1;
  const defFormMult=recentCn>avgCn+.5?1.1:recentCn<avgCn-.5?0.9:1;
  const trend=recentAvg>avgSc+.8?'↑ improving':recentAvg<avgSc-.8?'↓ declining':'→ stable';
  const consistency=cvSc<0.3?'consistent':cvSc<0.6?'moderate':'volatile';
  const defReliability=cvCn<0.3?'high':cvCn<0.6?'medium':'low';
  return{games:n,avgScored:avgSc,avgConceded:avgCn,avgTotal:avgTot,stdScored:stdSc,stdConceded:stdCn,cvScored:cvSc,cvConceded:cvCn,attack,defense,style,trend,consistency,defReliability,formMult,defFormMult,recentAvg,recentCn};
}

function getH2H(tA,tB,allMatches){
  return allMatches.filter(m=>m.ftActual&&((m.teamA===tA&&m.teamB===tB)||(m.teamA===tB&&m.teamB===tA)))
    .map(m=>{const g=parseScore(m.ftActual);return g?{a:g.a,b:g.b,total:g.total,date:m.date}:null}).filter(Boolean);
}

function getScoreFrequencies(allMatches){
  const dist={};
  allMatches.filter(m=>m.ftActual).forEach(m=>{
    const g=parseScore(m.ftActual);if(!g)return;
    const k=`${g.a}-${g.b}`;dist[k]=(dist[k]||0)+1;
  });
  return Object.entries(dist).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([s,c])=>({score:s,count:c,parts:parseScore(s)}));
}

function generatePrediction(teamA,teamB,allMatches,resultsOnly){
  const pA=buildTeamProfile(teamA,allMatches),pB=buildTeamProfile(teamB,allMatches);
  const h2h=getH2H(teamA,teamB,allMatches);
  const freqScores=getScoreFrequencies(resultsOnly);
  
  const atkMap={elite:6.5,high:4.5,medium:3.0,low:1.8};
  const defMap={'high weakness':5,'medium weakness':3.5,'low weakness':2};
  
  let rawA=(atkMap[pA.attack]*pA.formMult+defMap[pB.defense]*pB.defFormMult)/2;
  let rawB=(atkMap[pB.attack]*pB.formMult+defMap[pA.defense]*pA.defFormMult)/2;
  
  const atkStrength=(atkMap[pA.attack]+atkMap[pB.attack])/2;
  const corrFactor=atkStrength>5?1.15:atkStrength>3.5?1.05:atkStrength>2?0.95:0.85;
  rawA*=corrFactor;rawB*=corrFactor;
  
  let total=rawA+rawB;
  if(h2h.length){
    const h2hTotals=h2h.map(h=>h.total);
    const h2hAvg=avg(h2hTotals);
    const weight=h2h.length>=6?0.5:h2h.length>=3?0.4:0.3;
    total=total*(1-weight)+h2hAvg*weight;
    const h2hDist={};
    h2h.forEach(h=>{const k=`${h.a}-${h.b}`;h2hDist[k]=(h2hDist[k]||0)+1});
    const top=Object.entries(h2hDist).sort((a,b)=>b[1]-a[1])[0];
    if(top&&top[1]>=2){const cs=parseScore(top[0]);if(cs)total=total*.7+cs.total*.3}
  }
  
  const allTots=resultsOnly.map(m=>{const g=parseScore(m.ftActual);return g?g.total:null}).filter(Boolean);
  const gAvg=allTots.length?avg(allTots):8;
  const gStd=allTots.length>1?stdDev(allTots):3;
  const dataStrength=Math.min(1,(pA.games+pB.games)/20);
  const regWeight=0.3*(1-dataStrength)+0.1*dataStrength;
  total=total*(1-regWeight)+gAvg*regWeight;
  
  if(freqScores.length>=3){
    const closest=freqScores.reduce((b,c)=>Math.abs(c.parts.total-total)<Math.abs(b.parts.total-total)?c:b,freqScores[0]);
    const distWeight=Math.min(0.2,freqScores.length/50);
    total=total*(1-distWeight)+closest.parts.total*distWeight;
  }
  
  const ratio=total/(rawA+rawB);
  rawA*=ratio;rawB*=ratio;
  let ftA=Math.round(rawA),ftB=Math.round(rawB);
  const ftTotal=ftA+ftB;
  
  let suggestedA=ftA,suggestedB=ftB;
  if(freqScores.length){const match=freqScores.find(s=>s.parts.total===ftTotal&&s.count>=2);if(match){suggestedA=match.parts.a;suggestedB=match.parts.b}}
  
  const scores=[
    {a:suggestedA,b:suggestedB,label:'Most Likely'},
    {a:clamp(Math.round(suggestedA*((ftTotal+1)/ftTotal)),0,99),b:clamp(ftTotal+1-Math.round(suggestedA*((ftTotal+1)/ftTotal)),0,99),label:'High Probability'},
    {a:clamp(Math.round(suggestedA*((ftTotal+2)/ftTotal)),0,99),b:clamp(ftTotal+2-Math.round(suggestedA*((ftTotal+2)/ftTotal)),0,99),label:'Variance'}
  ];
  
  const htRatio=allTots.length?clamp(0.42+(gStd*.01),0.4,0.5):0.45;
  const htA=Math.round(suggestedA*htRatio),htB=Math.round(suggestedB*htRatio);
  
  const flow={
    early:`${teamA} ${pA.attack==='elite'||pA.attack==='high'?'presses high looking for early breakthrough':'starts cautiously probing'} while ${teamB} ${pB.style==='chaotic'?'responds with chaotic energy':'maintains defensive discipline'}. ${htA+htB>5?'Fast start expected.':'Tactical opening.'}`,
    mid:`Mid-phase: ${ftTotal>10?'both teams exchanging chances':ftTotal>7?'balanced possession':'defenses in control'}. ${pA.style==='chaotic'||pB.style==='chaotic'?'Structure cracking.':'Shape holding.'}`,
    chaos:`Late phase ${ftTotal>12?'erupts with rapid exchanges — defenses exhausted':ftTotal>8?'brings urgency but few chances':'fades with defenses dominant'}. ${pA.defReliability==='low'||pB.defReliability==='low'?'HIGH collapse risk.':''}`,
    dominant:pA.avgScored>pB.avgScored+1?teamA:pB.avgScored>pA.avgScored+1?teamB:'contested'
  };
  
  const ouPct=l=>allTots.length?Math.round(allTots.filter(t=>t>l).length/allTots.length*100):0;
  let bo={l:8.5,p:50,d:99},bu={l:8.5,p:50,d:99};
  [6.5,7.5,8.5,9.5,10.5,11.5,12.5,13.5,14.5,15.5,16.5,17.5,18.5].forEach(l=>{
    const op=ouPct(l),up=100-op,od=Math.abs(l-ftTotal),ud=Math.abs(l-ftTotal);
    if(op>=bo.p||(op>=bo.p-5&&od<bo.d))bo={l,p:op,d:od};
    if(up>=bu.p||(up>=bu.p-5&&ud<bu.d))bu={l,p:up,d:ud};
  });
  const primary=bo.p>=bu.p?`Over ${bo.l}`:`Under ${bu.l}`;
  const primaryRate=Math.max(bo.p,bu.p);
  const secondary=bo.p>=bu.p?`Under ${bu.l}`:`Over ${bo.l}`;
  const secondaryRate=Math.min(bo.p,bu.p);
  
  const dp=pA.games+pB.games+h2h.length*2;
  let conf=60;
  if(dp>30)conf+=15;else if(dp>15)conf+=10;else if(dp>8)conf+=5;else if(dp<5)conf-=15;
  if(pA.consistency==='consistent'&&pB.consistency==='consistent')conf+=5;
  if(pA.defReliability==='low'||pB.defReliability==='low')conf-=5;
  if(gStd<2)conf+=5;else if(gStd>5)conf-=8;
  if(h2h.length>=4)conf+=5;
  conf=clamp(conf,40,88);
  
  const traps=[];
  if(pA.games<3)traps.push(`${teamA}: ${pA.games} games`);
  if(pB.games<3)traps.push(`${teamB}: ${pB.games} games`);
  if(pA.cvScored>1||pB.cvScored>1)traps.push('High volatility');
  if(h2h.length&&Math.abs(avg(h2h.map(h=>h.total))-ftTotal)>3)traps.push('H2H conflict');
  if(ftTotal>gAvg+2.5*gStd&&gStd>0)traps.push('Above 2.5σ range');
  
  const clsf=ftTotal>15?'Chaos':ftTotal>11?'Open':ftTotal>7?'Balanced':'Closed';
  
  return{
    teamA:{name:teamA,attack:pA.attack,defense:pA.defense,style:pA.style,trend:pA.trend,consistency:pA.consistency,defReliability:pA.defReliability,form:pA.formMult>1?'🔥 HOT':pA.formMult<1?'❄ COLD':'➖ AVG',stats:{games:pA.games,avgScored:pA.avgScored,avgConceded:pA.avgConceded}},
    teamB:{name:teamB,attack:pB.attack,defense:pB.defense,style:pB.style,trend:pB.trend,consistency:pB.consistency,defReliability:pB.defReliability,form:pB.formMult>1?'🔥 HOT':pB.formMult<1?'❄ COLD':'➖ AVG',stats:{games:pB.games,avgScored:pB.avgScored,avgConceded:pB.avgConceded}},
    classification:clsf,
    classificationReason:ftTotal>15?`Chaos (${ftTotal} goals) — both defenses extremely vulnerable`:ftTotal>11?`Open (${ftTotal} goals) — attacking intent from both sides`:ftTotal>7?`Balanced (${ftTotal} goals) — moderate scoring`:`Closed (${ftTotal} goals) — defensive battle`,
    flow,htPrediction:`${htA}-${htB}`,secondHalf:{teamA:suggestedA-htA,teamB:suggestedB-htB},
    ftPrediction:`${suggestedA}-${suggestedB}`,
    ftReasoning:`Step 1: ${teamA} base = (${atkMap[pA.attack]}×${pA.formMult}+${defMap[pB.defense]}×${pB.defFormMult})/2 = ${rawA.toFixed(1)}. ${teamB} base = (${atkMap[pB.attack]}×${pB.formMult}+${defMap[pA.defense]}×${pA.defFormMult})/2 = ${rawB.toFixed(1)}. Step 2: Correlation ×${corrFactor.toFixed(2)}. Step 3: H2H ${h2h.length?`(${h2h.length} meetings, weight ${h2h.length>=6?50:h2h.length>=3?40:30}%)`:''}. Step 4: Regression ${(regWeight*100).toFixed(0)}% toward global ${gAvg.toFixed(1)}. Step 5: Score distribution anchored. Final: ${suggestedA}-${suggestedB} (${ftTotal} total).`,
    top3:scores.map(s=>({score:`${s.a}-${s.b}`,label:s.label,reason:s.label==='Most Likely'?'Primary data-driven projection':s.label==='High Probability'?'±1 goal variance':'±2 goal chaos scenario'})),
    keyPattern:h2h.length>=3?`H2H: ${h2h.length} meetings, avg ${avg(h2h.map(h=>h.total)).toFixed(1)} total`:freqScores.length>=5?`Score distribution (${freqScores.length} patterns) driving prediction`:`Team profiles: ${teamA}(${pA.attack}/${pA.defense}) vs ${teamB}(${pB.attack}/${pB.defense})`,
    momentum:pA.formMult>1&&pB.formMult>1?'Both in form':pA.formMult<1&&pB.formMult<1?'Both struggling':`${pA.formMult>1?teamA:pB.formMult>1?teamB:'Neither'} carrying momentum`,
    trapWarning:traps.length?traps.join(' | '):null,
    betting:{primaryLine:primary,primaryHitRate:primaryRate+'%',secondaryLine:secondary,secondaryHitRate:secondaryRate+'%',safeRange:`${Math.max(0,ftTotal-2)}-${ftTotal+2} goals`,risk:primaryRate>=68?'LOW':primaryRate>=55?'MEDIUM':'HIGH',strategy:primaryRate>=68?'Safe play':primaryRate>=55?'Value bet':'Aggressive',bettingNote:`Based on ${resultsOnly.length} results. ${primary} (${primaryRate}%) aligned with predicted ${ftTotal} total. Secondary: ${secondary} (${secondaryRate}%). ${h2h.length?`H2H avg: ${avg(h2h.map(h=>h.total)).toFixed(1)}.`:''}`},
    confidence:conf,
    confidenceReason:`Base 60%${dp>30?' +15 (rich data)':dp>15?' +10 (good data)':dp>8?' +5 (moderate)':dp<5?' -15 (sparse)':''}${pA.consistency==='consistent'&&pB.consistency==='consistent'?' +5 (consistent)':''}${pA.defReliability==='low'||pB.defReliability==='low'?' -5 (unreliable D)':''}${gStd<2?' +5 (stable league)':gStd>5?' -8 (chaotic)':''}${h2h.length>=4?' +5 (H2H rich)':''} = ${conf}%`
  };
}

const clsColor=c=>c==='Chaos'?'var(--red)':c==='Open'?'var(--orn)':c==='Balanced'?'var(--yel)':'var(--blu)';
const clsBadge=c=>c==='Chaos'?'bg-r':c==='Open'?'bg-o':c==='Balanced'?'bg-y':'bg-b';
const confColor=c=>c>=75?'var(--grn)':c>=60?'var(--yel)':c>=45?'var(--orn)':'var(--red)';
const getTeam=n=>TEAMS.find(t=>t.name===n)||{emoji:'⚽',color:'var(--mut)',abbr:'?'};

function renderPrediction(d){
  const tmA=getTeam(d._tA),tmB=getTeam(d._tB);
  const ft=parseScore(d.ftPrediction)||{a:0,b:0};
  const bet=d.betting||{},flow=d.flow||{},conf=d.confidence||50;
  
  document.getElementById('predictionOutput').innerHTML=`
    <div class="sb"><div class="sb-side"><div class="sb-club" style="color:${tmA.color}">${tmA.emoji} ${tmA.abbr}</div><div class="sb-name">${d._tA}</div></div><div class="sb-center"><div class="sb-ft">${ft.a}–${ft.b}</div><div class="sb-label">PREDICTED FT</div><div class="sb-ht-info">HT: ${d.htPrediction} · 2H: ${d.secondHalf.teamA}-${d.secondHalf.teamB}</div></div><div class="sb-side right"><div class="sb-club" style="color:${tmB.color}">${tmB.emoji} ${tmB.abbr}</div><div class="sb-name">${d._tB}</div></div></div>
    <div class="card"><div class="card-head"><div class="card-title" style="color:${clsColor(d.classification)}">${d.classification.toUpperCase()} MATCH</div><span class="badge ${clsBadge(d.classification)}">${ft.a+ft.b} GOALS</span></div><div class="card-body"><div style="font-size:12px;color:var(--mut);line-height:1.7">${d.classificationReason}</div><div class="ft-reasoning-block">${d.ftReasoning}</div></div></div>
    <div class="prof-grid">${[d.teamA,d.teamB].map(t=>{const tm=getTeam(t.name);return`<div class="prof-card"><div style="font-family:var(--fh);font-size:14px;font-weight:700;margin-bottom:10px">${tm.emoji} ${t.name} ${t.form?`<span class="badge ${t.form.includes('HOT')?'bg-g':t.form.includes('COLD')?'bg-r':'bg'}">${t.form}</span>`:''}</div><div class="prof-row"><div class="prof-lbl"><span>ATK</span><span style="color:var(--grn)">${t.attack} (${t.stats.avgScored.toFixed(1)}/g)</span></div><div class="prof-bar"><div class="prof-fill" style="width:${t.attack==='elite'?93:t.attack==='high'?72:t.attack==='medium'?46:22}%;background:var(--grn)"></div></div></div><div class="prof-row"><div class="prof-lbl"><span>DEF</span><span style="color:${t.defense.includes('high')?'var(--red)':t.defense.includes('medium')?'var(--yel)':'var(--grn)'}">${t.defense} (${t.stats.avgConceded.toFixed(1)}/g)</span></div><div class="prof-bar"><div class="prof-fill" style="width:${t.defense.includes('high')?88:t.defense.includes('medium')?56:26}%;background:${t.defense.includes('high')?'var(--red)':t.defense.includes('medium')?'var(--yel)':'var(--grn)'}"></div></div></div><div class="flex gap-6" style="margin-top:6px"><span class="badge bg">${t.style}</span><span class="badge bg">${t.consistency}</span><span class="badge bg">D:${t.defReliability}</span></div></div>`}).join('')}</div>
    <div class="card"><div class="card-head"><div class="card-title">MATCH FLOW</div>${flow.dominant?`<span class="badge bg-g">${flow.dominant}</span>`:''}</div><div class="card-body"><div style="display:flex;flex-direction:column;gap:6px">${flow.early?`<div style="background:var(--sur2);padding:10px 12px;border-radius:9px;display:flex;gap:10px"><span style="font-family:var(--fm);font-size:8px;color:var(--grn);width:48px">0–30%</span><span style="font-size:12px">${flow.early}</span></div>`:''}${flow.mid?`<div style="background:var(--sur2);padding:10px 12px;border-radius:9px;display:flex;gap:10px"><span style="font-family:var(--fm);font-size:8px;color:var(--grn);width:48px">30–70%</span><span style="font-size:12px">${flow.mid}</span></div>`:''}${flow.chaos?`<div style="background:var(--sur2);padding:10px 12px;border-radius:9px;display:flex;gap:10px"><span style="font-family:var(--fm);font-size:8px;color:var(--grn);width:48px">70–100%</span><span style="font-size:12px">${flow.chaos}</span></div>`:''}</div></div></div>
    <div class="card"><div class="card-head"><div class="card-title">TOP 3 SCORELINES</div></div><div class="card-body"><div class="t3-list">${d.top3.map((s,i)=>`<div class="t3-item${i===0?' win':''}"><div class="t3-rank">${['🥇','🥈','🥉'][i]}</div><div class="t3-score">${s.score}</div><div style="text-align:right"><span class="badge ${i===0?'bg-g':i===1?'bg-y':'bg'}">${s.label}</span><div style="font-family:var(--fm);font-size:7.5px;color:var(--mut);margin-top:2px">${s.reason}</div></div></div>`).join('')}</div></div>
    ${d.trapWarning?`<div style="background:rgba(255,82,82,.05);border:1px solid rgba(255,82,82,.2);border-radius:11px;padding:12px 14px;margin-bottom:12px"><div style="font-family:var(--fh);font-size:17px;font-weight:700;color:var(--red);margin-bottom:4px">⚠ TRAP MATCH</div><div style="font-size:12px;color:rgba(255,82,82,.75)">${d.trapWarning}</div></div>`:''}
    <div class="bet-card"><div class="bet-header"><div><div style="font-family:var(--fm);font-size:7px;color:var(--mut);margin-bottom:4px">PRIMARY SIGNAL</div><div class="bet-line" style="color:${bet.primaryLine?.startsWith('Under')?'var(--blu)':'var(--grn)'}">${bet.primaryLine}</div><div style="font-family:var(--fm);font-size:9px;color:var(--mut);margin-top:4px">${bet.primaryHitRate} hit rate</div></div><span class="badge ${bet.risk==='HIGH'?'bg-r':bet.risk==='MEDIUM'?'bg-y':'bg-g'}">${bet.risk} RISK</span></div><div class="bet-grid"><div class="bet-item"><div class="bet-item-label">SAFE RANGE</div><div class="bet-item-value" style="color:var(--grn)">${bet.safeRange}</div></div><div class="bet-item"><div class="bet-item-label">STRATEGY</div><div class="bet-item-value" style="color:var(--yel)">${bet.strategy}</div></div><div class="bet-item"><div class="bet-item-label">TOTAL</div><div class="bet-item-value">${ft.a+ft.b} goals</div></div></div><div style="margin-top:12px;padding:8px 11px;background:var(--bg);border-radius:8px;font-size:11px;color:var(--mut);line-height:1.7">${bet.bettingNote}</div></div>
    <div class="conf-card"><div class="conf-header"><div><div style="font-family:var(--fm);font-size:7px;color:var(--mut);margin-bottom:4px">CONFIDENCE</div><div class="conf-pct" style="color:${confColor(conf)}">${conf}%</div></div><span class="badge ${conf>=75?'bg-g':conf>=60?'bg-y':conf>=45?'bg-o':'bg-r'}">${conf>=75?'HIGH':conf>=60?'MODERATE':conf>=45?'LOW':'VERY LOW'}</span></div><div class="conf-bar-wrap"><div class="conf-bar" style="width:${conf}%;background:${confColor(conf)}"></div></div><div style="font-size:12px;color:var(--mut);line-height:1.7">${d.confidenceReason}</div></div>
    <div class="save-bar"><div><div style="font-family:var(--fh);font-size:14px;font-weight:700">SAVE PREDICTION</div><div style="font-family:var(--fm);font-size:7.5px;color:var(--mut)">LOG RESULT LATER</div></div><button class="btn btn-g btn-sm" id="saveBtn" onclick="savePrediction()">SAVE</button></div>
  `;
}

function runPrediction(){
  const tA=state.picks.A,tB=state.picks.B;
  if(!tA||!tB){showToast('Select both teams');return}
  const btn=document.getElementById('predictBtn');
  btn.disabled=true;btn.textContent='COMPUTING…';
  setTimeout(()=>{
    const db=loadDB(),resultsOnly=db.filter(m=>m.ftActual);
    const pred=generatePrediction(tA,tB,db,resultsOnly);
    pred._tA=tA;pred._tB=tB;state.lastPrediction=pred;
    document.getElementById('predictionSection').style.display='block';
    renderPrediction(pred);
    document.getElementById('predictionOutput').scrollIntoView({behavior:'smooth'});
    btn.disabled=false;btn.textContent='GENERATE PREDICTION';
  },50);
}

function savePrediction(){
  if(!state.lastPrediction)return;
  const d=state.lastPrediction;
  addMatch({id:genId(),date:new Date().toISOString(),teamA:d._tA,teamB:d._tB,htPred:d.htPrediction,ftPred:d.ftPrediction,classification:d.classification,confidence:d.confidence,top3:d.top3.map(s=>s.score).join(', '),keyPattern:d.keyPattern,primaryLine:d.betting.primaryLine,secondaryLine:d.betting.secondaryLine,bettingRisk:d.betting.risk,safeRange:d.betting.safeRange,trapWarning:d.trapWarning,htActual:null,ftActual:null,status:'pending'});
  showToast('Saved!');
  document.getElementById('saveBtn').disabled=true;
  state.lastPrediction=null;
}

// ═══════════════════════════════════════
// RESULTS & DATABASE
// ═══════════════════════════════════════
function renderResults(){
  const db=loadDB();
  const pend=db.filter(m=>m.status==='pending'),done=db.filter(m=>m.status==='result').slice(0,50);
  document.getElementById('pendingBadge').textContent=`${pend.length} PENDING`;
  document.getElementById('pendingList').innerHTML=pend.length?pend.map(m=>`<div class="pending-card"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-family:var(--fh);font-size:19px;font-weight:900">${m.teamA} vs ${m.teamB}</span><span class="badge bg-y">PENDING</span></div><div class="flex flex-wrap gap-6" style="margin-bottom:10px"><span class="badge bg">FT: ${m.ftPred||'?'}</span>${m.primaryLine?`<span class="badge bg-g">${m.primaryLine}</span>`:''}</div><div style="font-family:var(--fm);font-size:8px;color:var(--mut);margin-bottom:10px">${fmtDate(m.date)}</div><div class="flex gap-6"><button class="btn btn-g btn-sm" onclick="openResultModal('${m.id}')">ENTER RESULT</button><button class="btn btn-ghost btn-sm" onclick="deleteMatch('${m.id}')">DELETE</button></div></div>`).join(''):`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">NO PENDING</div></div>`;
  document.getElementById('completedList').innerHTML=done.length?done.map(m=>{const acc=calcAcc(m);return`<div class="history-item"><div style="font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:6px">${m.teamA} vs ${m.teamB}</div><div class="flex gap-6" style="margin-bottom:6px"><span style="font-family:var(--fm);font-size:9.5px"><span style="color:var(--mut)">PRED </span>${m.ftPred||'?'}</span><span style="font-family:var(--fm);font-size:9.5px"><span style="color:var(--mut)">ACT </span><span style="color:var(--grn)">${m.ftActual||'?'}</span></span></div><div class="flex gap-6">${acc!==null?`<span class="badge ${acc>=70?'bg-g':acc>=40?'bg-y':'bg-r'}">${acc}%</span>`:''}<span style="font-family:var(--fm);font-size:8px;color:var(--mut)">${fmtDate(m.date)}</span><button class="btn btn-r btn-sm" style="padding:3px 8px;font-size:8px" onclick="deleteMatch('${m.id}')">✕</button></div></div>`}).join(''):`<div class="empty-state"><div class="empty-icon">🏁</div><div class="empty-text">NO RESULTS</div></div>`;
}

function renderDatabase(){
  const db=loadDB(),wr=db.filter(m=>m.ftActual);
  const tots=wr.map(m=>{const g=parseScore(m.ftActual);return g?g.total:null}).filter(Boolean);
  const gAvg=tots.length?avg(tots):null,gStd=tots.length>1?stdDev(tots):null;
  const accs=wr.filter(m=>m.ftPred).map(m=>calcAcc(m)).filter(a=>a!==null);
  const avgAcc=accs.length?Math.round(avg(accs)):null;
  document.getElementById('totalBadge').textContent=`${db.length} MATCHES`;
  document.getElementById('globalStats').innerHTML=`<div class="stat-card"><div class="stat-value">${db.length}</div><div class="stat-label">TOTAL</div></div><div class="stat-card"><div class="stat-value" style="color:var(--grn)">${wr.length}</div><div class="stat-label">RESULTS</div></div><div class="stat-card"><div class="stat-value" style="color:var(--yel)">${gAvg?.toFixed(1)||'—'}</div><div class="stat-label">AVG GOALS</div></div><div class="stat-card"><div class="stat-value" style="color:var(--blu)">${avgAcc!==null?avgAcc+'%':'—'}</div><div class="stat-label">ACCURACY</div></div><div class="stat-card"><div class="stat-value" style="font-size:24px">${tots.length?Math.min(...tots)+'–'+Math.max(...tots):'—'}</div><div class="stat-label">RANGE</div></div><div class="stat-card"><div class="stat-value" style="color:var(--orn)">${gStd?'±'+gStd.toFixed(1):'—'}</div><div class="stat-label">STD DEV</div></div>`;
  document.getElementById('ouGrid').innerHTML=[6.5,7.5,8.5,9.5,10.5,11.5,12.5,13.5,14.5,15.5,16.5,17.5,18.5].map(l=>{const h=tots.filter(t=>t>l).length;const p=tots.length?Math.round(h/tots.length*100):null;return`<div class="ou-box"><div style="font-family:var(--fm);font-size:7px;color:var(--grn)">OVR ${l}</div><div style="font-family:var(--fh);font-size:22px;font-weight:700;color:${p===null?'var(--mut)':p>=65?'var(--grn)':p>=50?'var(--yel)':'var(--red)'}">${p!==null?p+'%':'—'}</div><div style="height:1px;background:var(--bdr);margin:4px 0"></div><div style="font-family:var(--fm);font-size:7px;color:var(--blu)">UND ${l}</div><div style="font-family:var(--fh);font-size:22px;font-weight:700;color:${p===null?'var(--mut)':(100-p)>=65?'var(--grn)':(100-p)>=50?'var(--yel)':'var(--red)'}">${p!==null?(100-p)+'%':'—'}</div></div>`}).join('');
  const ts={};wr.forEach(m=>{const g=parseScore(m.ftActual);if(!g)return;[[m.teamA,g.a,g.b],[m.teamB,g.b,g.a]].forEach(([t,sc,cn])=>{if(!ts[t])ts[t]={sc:[],cn:[]};ts[t].sc.push(sc);ts[t].cn.push(cn)})});
  const sorted=Object.entries(ts).filter(([,v])=>v.sc.length>=1).sort(([,a],[,b])=>avg(b.sc)-avg(a.sc));
  document.getElementById('teamAverages').innerHTML=sorted.length?sorted.map(([name,v])=>{const tm=getTeam(name);return`<div class="team-row" style="background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between"><div><div style="font-family:var(--fh);font-size:16px;font-weight:700">${tm.emoji} ${name}</div><div style="font-family:var(--fm);font-size:8px;color:var(--mut)">${v.sc.length} games</div></div><div class="flex gap-6"><div style="text-align:center"><div style="font-family:var(--fh);font-size:20px;font-weight:700;color:var(--grn)">${avg(v.sc).toFixed(1)}</div><div style="font-family:var(--fm);font-size:7px;color:var(--mut)">SCORED</div></div><div style="text-align:center"><div style="font-family:var(--fh);font-size:20px;font-weight:700;color:var(--red)">${avg(v.cn).toFixed(1)}</div><div style="font-family:var(--fm);font-size:7px;color:var(--mut)">CONCEDED</div></div></div></div>`}).join(''):`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">NEED RESULTS</div></div>`;
  document.getElementById('historyList').innerHTML=db.slice(0,60).map(m=>{const acc=calcAcc(m);return`<div class="history-item"><div style="font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:6px">${m.teamA} vs ${m.teamB}</div><div class="flex gap-6" style="margin-bottom:6px"><span style="font-family:var(--fm);font-size:9.5px"><span style="color:var(--mut)">PRED </span>${m.ftPred||'?'}</span>${m.ftActual?`<span style="font-family:var(--fm);font-size:9.5px"><span style="color:var(--mut)">ACT </span><span style="color:var(--grn)">${m.ftActual}</span></span>`:''}</div><div class="flex gap-6">${m.status==='pending'?'<span class="badge bg-y">PENDING</span>':''}${acc!==null?`<span class="badge ${acc>=70?'bg-g':acc>=40?'bg-y':'bg-r'}">${acc}%</span>`:''}<span style="font-family:var(--fm);font-size:8px;color:var(--mut)">${fmtDate(m.date)}</span><button class="btn btn-r btn-sm" style="padding:3px 8px;font-size:8px" onclick="deleteMatch('${m.id}')">✕</button></div></div>`}).join('')||`<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-text">NO DATA</div></div>`;
}

function openResultModal(id){const m=loadDB().find(x=>x.id===id);if(!m)return;state.activeModalId=id;document.getElementById('modalTitle').textContent=`${m.teamA} vs ${m.teamB}`;document.getElementById('modalSubtitle').textContent=`PRED: ${m.ftPred||'?'}`;document.getElementById('ftALabel').textContent=m.teamA;document.getElementById('ftBLabel').textContent=m.teamB;['ftA','ftB','htA','htB'].forEach(el=>document.getElementById(el).value='');document.getElementById('resultModal').classList.add('on')}
function closeResultModal(){document.getElementById('resultModal').classList.remove('on');state.activeModalId=null}
function saveResultEntry(){if(!state.activeModalId)return;const ftA=document.getElementById('ftA').value,ftB=document.getElementById('ftB').value;if(ftA===''||ftB===''){showToast('Enter FT score');return}const htA=document.getElementById('htA').value,htB=document.getElementById('htB').value;updateMatch(state.activeModalId,{ftActual:`${ftA}-${ftB}`,htActual:(htA!==''&&htB!=='')?`${htA}-${htB}`:null,status:'result'});closeResultModal();showToast('Result saved');if(state.currentPage==='results')renderResults();if(state.currentPage==='db')renderDatabase()}

function switchPage(page){document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('on'));document.getElementById('page-'+page).classList.add('on');document.getElementById('nav-'+page).classList.add('on');state.currentPage=page;location.hash=page;if(page==='results')renderResults();if(page==='db')renderDatabase()}
function calcAcc(m){if(!m.ftPred||!m.ftActual)return null;const p=parseScore(m.ftPred),a=parseScore(m.ftActual);if(!p||!a)return null;const diff=Math.abs(p.a-a.a)+Math.abs(p.b-a.b);const sc=diff===0?100:diff===1?83:diff===2?66:diff===3?49:diff===4?32:15;return Math.min(100,sc+((p.a>p.b&&a.a>a.b)||(p.a<p.b&&a.a<a.b)||(p.a===p.b&&a.a===a.b)?5:0))}
function fmtDate(d){try{return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}catch{return d||'—'}}
function refreshCounters(){const db=loadDB();document.getElementById('pendingBadge').textContent=`${db.filter(m=>m.status==='pending').length} PENDING`;document.getElementById('totalBadge').textContent=`${db.length} MATCHES`;document.getElementById('miniBadge').textContent=`${db.length} MATCHES`}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2500)}

(function init(){refreshCounters();window.addEventListener('popstate',()=>switchPage(location.hash?.replace('#','')||'predict'));if(location.hash)switchPage(location.hash.replace('#',''))})();
</script>
</body>
