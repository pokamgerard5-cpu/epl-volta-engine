<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#060911">
<title>EPL 4v4 · VOLTA ENGINE v8</title>
<style>
:root{
  --bg:#060911;--bg2:#0b0e1b;--sur:#101422;--sur2:#151929;
  --bdr:#1c2238;--bdr2:#263050;
  --grn:#00e87a;--orn:#ff7043;--blu:#29b6f6;--yel:#ffd54f;
  --red:#ff5252;--txt:#dce4f5;--mut:#4a5878;--pur:#ab47bc;
  --fh:'Barlow Condensed',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --fb:'Inter',sans-serif;
  --nav-h:62px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--fb);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;min-height:100vh;padding-bottom:var(--nav-h)}
.page{display:none;flex:1;animation:fadeIn .2s ease}
.page.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,9,17,.96);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;height:var(--nav-h)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--mut);cursor:pointer;font-family:var(--fm);font-size:7px;letter-spacing:1.8px;text-transform:uppercase;transition:all .2s}
.nav-btn.on{color:var(--grn)}
.nav-btn.on::after{content:'';position:absolute;top:0;left:30%;right:30%;height:2px;background:var(--grn);border-radius:0 0 2px 2px;box-shadow:0 0 12px rgba(0,232,122,.5)}
.nav-btn svg{width:19px;height:19px;stroke-width:1.6}

.hdr{padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10;background:var(--bg)}
.hdr-l .ht{font-family:var(--fh);font-size:32px;font-weight:900;letter-spacing:2px;line-height:1}
.hdr-l .hs{font-family:var(--fm);font-size:8px;color:var(--grn);letter-spacing:2.5px;margin-top:2px}

.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:5px;font-family:var(--fm);font-size:7.5px;letter-spacing:1px;font-weight:600;text-transform:uppercase;border:1px solid transparent;gap:4px}
.bg{background:rgba(74,88,120,.1);color:var(--mut);border-color:rgba(74,88,120,.2)}
.bg-g{background:rgba(0,232,122,.08);color:var(--grn);border-color:rgba(0,232,122,.2)}
.bg-o{background:rgba(255,112,67,.08);color:var(--orn);border-color:rgba(255,112,67,.2)}
.bg-b{background:rgba(41,182,246,.08);color:var(--blu);border-color:rgba(41,182,246,.2)}
.bg-y{background:rgba(255,213,79,.08);color:var(--yel);border-color:rgba(255,213,79,.2)}
.bg-r{background:rgba(255,82,82,.08);color:var(--red);border-color:rgba(255,82,82,.2)}
.bg-p{background:rgba(171,71,188,.08);color:var(--pur);border-color:rgba(171,71,188,.2)}

.sec{padding:14px 16px;max-width:600px;margin:0 auto;width:100%}
.sl{font-family:var(--fm);font-size:8.5px;letter-spacing:2px;color:var(--mut);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sl::after{content:'';flex:1;height:1px;background:var(--bdr)}

.api-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.api-input{flex:1;background:var(--sur2);border:1px solid var(--bdr2);border-radius:10px;padding:10px 14px;font-family:var(--fm);font-size:10px;color:var(--txt);outline:none}
.api-input:focus{border-color:var(--pur)}
.api-input::placeholder{color:var(--mut)}

.arena{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;margin-bottom:14px}
.arena-grid{display:grid;grid-template-columns:1fr 52px 1fr;align-items:center;padding:20px 16px}
.team-side{display:flex;flex-direction:column;align-items:center;gap:10px}
.team-btn{width:72px;height:72px;border-radius:16px;border:2px solid var(--bdr2);background:var(--sur2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;gap:2px}
.team-btn.sel{border-color:var(--grn);box-shadow:0 0 24px rgba(0,232,122,.12)}
.tb-emoji{font-size:26px;line-height:1}
.tb-abbr{font-family:var(--fh);font-size:10px;font-weight:700;color:var(--mut)}
.team-btn.sel .tb-abbr{color:var(--grn)}
.tn{font-family:var(--fh);font-size:14px;font-weight:700;text-align:center;max-width:100px;line-height:1.2}
.tn.placeholder{color:var(--mut);font-size:10px;font-family:var(--fm);font-weight:400}
.vs-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.vs-div{width:1px;height:20px;background:var(--bdr)}
.vs-txt{font-family:var(--fh);font-size:36px;font-weight:900;color:var(--bdr2)}

.pred-btn{width:100%;height:56px;border:none;border-radius:14px;cursor:pointer;font-family:var(--fh);font-size:24px;font-weight:900;letter-spacing:3px;background:var(--grn);color:#060911;transition:all .2s}
.pred-btn:disabled{opacity:.4;cursor:not-allowed}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:var(--fh);font-weight:700;letter-spacing:1px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-sm{padding:8px 16px;font-size:11px}
.btn-g{background:var(--grn);color:#060911}
.btn-ghost{background:var(--sur2);color:var(--txt);border:1px solid var(--bdr2)}
.btn-r{background:rgba(255,82,82,.08);color:var(--red);border:1px solid rgba(255,82,82,.2)}

.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(6,9,17,.94);backdrop-filter:blur(10px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.on{opacity:1;pointer-events:auto}
.modal-sheet{width:100%;background:var(--bg2);border-top:1px solid var(--bdr);border-radius:22px 22px 0 0;padding:20px 18px 34px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 14px}
.modal-scores{display:grid;grid-template-columns:1fr 28px 1fr;align-items:center;gap:12px;margin-bottom:14px}
.score-input{background:var(--sur);border:1px solid var(--bdr2);border-radius:9px;padding:12px;font-family:var(--fh);font-size:28px;font-weight:900;color:var(--txt);text-align:center;outline:none;width:100%}

.sb{background:var(--bg);border:1px solid var(--bdr);border-radius:14px;padding:20px 16px;margin-bottom:12px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.sb-side{display:flex;flex-direction:column;gap:4px}
.sb-side.right{align-items:flex-end;text-align:right}
.sb-club{font-family:var(--fh);font-size:11px;color:var(--mut)}
.sb-name{font-family:var(--fh);font-size:20px;font-weight:900}
.sb-center{text-align:center}
.sb-ft{font-family:var(--fh);font-size:52px;font-weight:900;color:var(--grn);letter-spacing:-2px;line-height:1}
.sb-label{font-family:var(--fm);font-size:7px;color:var(--mut);letter-spacing:2px}
.sb-ht-info{font-family:var(--fm);font-size:10px;color:var(--mut);margin-top:4px}

.card{background:var(--sur);border:1px solid var(--bdr);border-radius:13px;margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.card-title{font-family:var(--fh);font-size:13px;font-weight:700}
.card-body{padding:14px}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--sur2);border:1px solid var(--bdr2);border-radius:10px;padding:10px 20px;font-family:var(--fm);font-size:10px;z-index:500;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}

.flex{display:flex}.flex-wrap{flex-wrap:wrap}.gap-6{gap:6px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:12px}
.empty-icon{font-size:40px;opacity:.15}
.empty-text{font-family:var(--fm);font-size:10px;color:var(--mut);text-align:center}
</style>
</head>
<body>
<div id="app">

<!-- PREDICT PAGE -->
<div class="page on" id="page-predict">
  <div class="hdr">
    <div class="hdr-l"><div class="ht">EPL 4v4</div><div class="hs">ENGINE v8 · STABLE</div></div>
    <span class="badge bg-g" id="miniBadge">0 MATCHES</span>
  </div>
  <div class="sec">
    <div class="api-row">
      <input class="api-input" id="apiKeyInput" type="password" placeholder="🔑 Anthropic API key (optional)...">
      <span id="apiKeyStatus" class="badge bg">NO AI</span>
    </div>
    <div class="arena">
      <div class="arena-grid">
        <div class="team-side">
          <button class="team-btn" id="btnA" onclick="openTeamSelect('A')">
            <span class="tb-emoji" id="emojiA">⚽</span>
            <span class="tb-abbr" id="abbrA">HOME</span>
          </button>
          <div class="tn placeholder" id="nameA">TAP TO SELECT</div>
        </div>
        <div class="vs-col"><div class="vs-div"></div><div class="vs-txt">VS</div><div class="vs-div"></div></div>
        <div class="team-side">
          <button class="team-btn" id="btnB" onclick="openTeamSelect('B')">
            <span class="tb-emoji" id="emojiB">⚽</span>
            <span class="tb-abbr" id="abbrB">AWAY</span>
          </button>
          <div class="tn placeholder" id="nameB">TAP TO SELECT</div>
        </div>
      </div>
    </div>
    <button class="pred-btn" id="predictBtn" onclick="runPrediction()">GENERATE PREDICTION</button>
  </div>
  <div class="sec" id="predictionSection" style="display:none">
    <div class="sl">ENGINE OUTPUT</div>
    <div id="predictionOutput"></div>
  </div>
</div>

<!-- RESULTS PAGE -->
<div class="page" id="page-results">
  <div class="hdr"><div class="hdr-l"><div class="ht">RESULTS</div><div class="hs">TRACKING</div></div><span class="badge bg-y" id="pendingBadge">0 PENDING</span></div>
  <div class="sec"><div class="sl">PENDING</div><div id="pendingList"></div><div class="sl">COMPLETED</div><div id="completedList"></div></div>
</div>

<!-- DATABASE PAGE -->
<div class="page" id="page-db">
  <div class="hdr"><div class="hdr-l"><div class="ht">DATABASE</div><div class="hs">INTELLIGENCE</div></div><span class="badge bg-g" id="totalBadge">0 MATCHES</span></div>
  <div class="sec"><div class="sl">ELO RATINGS</div><div id="eloRankings"></div><div class="sl">STATS</div><div id="globalStats"></div><div class="sl">HISTORY</div><div id="historyList"></div></div>
</div>

<!-- TEAM SELECT MODAL -->
<div class="modal-overlay" id="teamModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="font-family:var(--fh);font-size:22px;font-weight:700;margin-bottom:16px;text-align:center">SELECT <span id="teamModalSide">HOME</span></div>
    <div id="teamList" style="max-height:60vh;overflow-y:auto"></div>
    <button class="btn btn-ghost" style="width:100%;height:48px;margin-top:12px;font-size:15px" onclick="closeTeamModal()">CANCEL</button>
  </div>
</div>

<!-- RESULT MODAL -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="font-family:var(--fh);font-size:22px;font-weight:700;margin-bottom:4px" id="modalTitle">ENTER RESULT</div>
    <div style="font-family:var(--fm);font-size:9px;color:var(--mut);margin-bottom:16px" id="modalSubtitle"></div>
    <div class="modal-scores">
      <div><div style="font-family:var(--fm);font-size:8px;color:var(--mut);margin-bottom:4px" id="ftALabel">HOME</div><input class="score-input" type="number" id="ftA" min="0" max="99" placeholder="0"></div>
      <div style="font-family:var(--fh);font-size:24px;color:var(--mut);text-align:center">–</div>
      <div><div style="font-family:var(--fm);font-size:8px;color:var(--mut);margin-bottom:4px" id="ftBLabel">AWAY</div><input class="score-input" type="number" id="ftB" min="0" max="99" placeholder="0"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1;height:48px;font-size:15px" onclick="closeResultModal()">CANCEL</button>
      <button class="btn btn-g" style="flex:1;height:48px;font-size:15px" onclick="saveResult()">SAVE RESULT</button>
    </div>
  </div>
</div>

<nav>
  <button class="nav-btn on" id="nav-predict" onclick="switchPage('predict')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round"/></svg>PREDICT</button>
  <button class="nav-btn" id="nav-results" onclick="switchPage('results')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-linecap="round"/></svg>RESULTS</button>
  <button class="nav-btn" id="nav-db" onclick="switchPage('db')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" stroke-linecap="round"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" stroke-linecap="round"/></svg>DATABASE</button>
</nav>

<div class="toast" id="toast"></div>
</div>

<script>
// ════════════════ CORE DATA ════════════════
var TEAMS = [
  {name:'Arsenal',emoji:'🔴',color:'#EF0107',abbr:'ARS',full:'Arsenal'},
  {name:'AstonVilla',emoji:'🟣',color:'#95BFE5',abbr:'AVL',full:'Aston Villa'},
  {name:'Bournemouth',emoji:'🍒',color:'#DA291C',abbr:'BOU',full:'Bournemouth'},
  {name:'Brentford',emoji:'🐝',color:'#FFD700',abbr:'BRE',full:'Brentford'},
  {name:'Brighton',emoji:'🔵',color:'#0057B8',abbr:'BHA',full:'Brighton'},
  {name:'Burnley',emoji:'🟤',color:'#6C1D45',abbr:'BUR',full:'Burnley'},
  {name:'Chelsea',emoji:'💙',color:'#034694',abbr:'CHE',full:'Chelsea'},
  {name:'CrystalPalace',emoji:'🦅',color:'#1B458F',abbr:'CRY',full:'Crystal Palace'},
  {name:'Everton',emoji:'🔵',color:'#003399',abbr:'EVE',full:'Everton'},
  {name:'Fulham',emoji:'⚫',color:'#CC0000',abbr:'FUL',full:'Fulham'},
  {name:'Liverpool',emoji:'🔴',color:'#C8102E',abbr:'LIV',full:'Liverpool'},
  {name:'Luton',emoji:'🟠',color:'#F78F1E',abbr:'LUT',full:'Luton Town'},
  {name:'ManCity',emoji:'🩵',color:'#6CABDD',abbr:'MCI',full:'Manchester City'},
  {name:'ManUtd',emoji:'👹',color:'#DA291C',abbr:'MUN',full:'Manchester United'},
  {name:'Newcastle',emoji:'⚫',color:'#241F20',abbr:'NEW',full:'Newcastle United'},
  {name:'Nottingham',emoji:'🌳',color:'#DD0000',abbr:'NFO',full:'Nottingham Forest'},
  {name:'Sheffield',emoji:'🔴',color:'#EE2737',abbr:'SHU',full:'Sheffield United'},
  {name:'Tottenham',emoji:'⚪',color:'#132257',abbr:'TOT',full:'Tottenham Hotspur'},
  {name:'WestHam',emoji:'⚒️',color:'#7A263A',abbr:'WHU',full:'West Ham United'},
  {name:'Wolves',emoji:'🐺',color:'#FDB913',abbr:'WOL',full:'Wolverhampton Wanderers'}
];

var DB_KEY = 'epl4v4:v8:matches';
var ELO_KEY = 'epl4v4:v8:elo';
var API_KEY = 'epl4v4:apikey';

var state = {page:'predict',pickA:null,pickB:null,lastPred:null,resultId:null,teamSide:null};

// ════════════════ HELPERS ════════════════
function avg(a){return a.length?a.reduce(function(s,v){return s+v},0)/a.length:0}
function clamp(v,l,h){return Math.max(l,Math.min(h,v))}
function parseScore(s){
  if(!s)return null;
  var p=s.split('-');if(p.length!==2)return null;
  var a=parseInt(p[0]),b=parseInt(p[1]);
  if(isNaN(a)||isNaN(b))return null;
  return{a:a,b:b,total:a+b};
}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function getT(n){var f=TEAMS.find(function(t){return t.name===n});return f||{emoji:'⚽',color:'#4a5878',abbr:'?',full:n||'Unknown'}}
function fmt(d){try{return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}catch(e){return d||'—'}}

// ════════════════ STORAGE ════════════════
function loadDB(){
  try{var d=localStorage.getItem(DB_KEY);return d?JSON.parse(d):[]}catch(e){return[]}
}
function saveDB(db){try{localStorage.setItem(DB_KEY,JSON.stringify(db));return true}catch(e){return false}}
function loadElo(){
  try{var d=localStorage.getItem(ELO_KEY);return d?JSON.parse(d):{}}catch(e){return{}}
}
function saveElo(e){try{localStorage.setItem(ELO_KEY,JSON.stringify(e))}catch(e){}}
function getElo(){
  var e=loadElo();
  TEAMS.forEach(function(t){if(!e[t.name])e[t.name]=1500});
  return e;
}

// ════════════════ DATA RECOVERY ════════════════
function recoverData(){
  var current=loadDB();
  var ids={};current.forEach(function(m){ids[m.id]=true});
  var recovered=0;
  var keys=['epl4v4:v7:matches','epl4v4:v6:matches','epl4v4:v5:matches','epl4v4:v4:matches','epl4v4:v3:matches','epl4v4:v2:matches','epl4v4:v1:matches','epl4v4:matches','epl4v4:results'];
  
  keys.forEach(function(key){
    try{
      var raw=localStorage.getItem(key);
      if(!raw)return;
      var data=JSON.parse(raw);
      if(!Array.isArray(data))return;
      data.forEach(function(m){
        if(!m.id)m.id=id();
        if(ids[m.id])return;
        ids[m.id]=true;
        if(!m.date)m.date=new Date().toISOString();
        if(!m.status)m.status=m.ftActual?'result':'pending';
        // normalize team names
        if(m.teamA){var na=normalizeName(m.teamA);if(na)m.teamA=na;}
        if(m.teamB){var nb=normalizeName(m.teamB);if(nb)m.teamB=nb;}
        current.push(m);
        recovered++;
      });
    }catch(e){}
  });
  
  if(recovered>0){
    saveDB(current);
    return recovered;
  }
  return 0;
}

function normalizeName(input){
  if(!input)return null;
  var c=input.trim();
  var found=TEAMS.find(function(t){return t.name===c||t.full===c||t.abbr===c});
  if(found)return found.name;
  var l=c.toLowerCase().replace(/\s+/g,'');
  found=TEAMS.find(function(t){return t.name.toLowerCase()===l||t.full.toLowerCase().replace(/\s+/g,'')===l});
  return found?found.name:null;
}

// ════════════════ ELO ════════════════
function updateElo(a,b,sa,sb){
  var e=loadElo();
  var ra=e[a]||1500,rb=e[b]||1500;
  var ea=1/(1+Math.pow(10,(rb-ra)/400));
  var eb=1-ea;
  var aa=sa>sb?1:sa<sb?0:0.5;
  var gd=Math.abs(sa-sb);
  var mm=Math.min(1+gd*0.15,2.5);
  var K=32;
  e[a]=Math.round(ra+K*mm*(aa-ea));
  e[b]=Math.round(rb+K*mm*((1-aa)-eb));
  saveElo(e);
}

function rebuildElo(){
  var e={};TEAMS.forEach(function(t){e[t.name]=1500});saveElo(e);
  var db=loadDB().filter(function(m){return m.ftActual}).reverse();
  db.forEach(function(m){var g=parseScore(m.ftActual);if(g)updateElo(m.teamA,m.teamB,g.a,g.b)});
}

// ════════════════ POISSON ════════════════
function poissonPMF(k,lam){
  if(lam<=0)return k===0?1:0;
  if(k>25)return 0;
  var lp=-lam+k*Math.log(lam);
  for(var i=2;i<=k;i++)lp-=Math.log(i);
  return Math.exp(lp);
}

function poissonProbs(lamA,lamB,maxG){
  maxG=maxG||15;
  var probs=[],total=0,hw=0,dr=0,aw=0;
  for(var a=0;a<=maxG;a++){
    for(var b=0;b<=maxG;b++){
      var p=poissonPMF(a,lamA)*poissonPMF(b,lamB);
      if(p>1e-8){
        probs.push({a:a,b:b,score:a+'-'+b,prob:p,total:a+b});
        total+=p;
        if(a>b)hw+=p;else if(a===b)dr+=p;else aw+=p;
      }
    }
  }
  if(total<=0)return null;
  probs.forEach(function(p){p.prob/=total});
  probs.sort(function(a,b){return b.prob-a.prob});
  return{probs:probs.slice(0,15),homeWin:hw/total,draw:dr/total,awayWin:aw/total,expTotal:probs.reduce(function(s,p){return s+p.total*p.prob},0)};
}

// ════════════════ PREDICTION ════════════════
function makePrediction(teamA,teamB){
  var db=loadDB();
  var results=db.filter(function(m){return m.ftActual});
  
  // Team stats
  var ga=[],gb=[];
  results.forEach(function(m){
    var g=parseScore(m.ftActual);if(!g)return;
    if(m.teamA===teamA)ga.push({sc:g.a,cn:g.b,tot:g.total});
    if(m.teamB===teamA)ga.push({sc:g.b,cn:g.a,tot:g.total});
    if(m.teamA===teamB)gb.push({sc:g.a,cn:g.b,tot:g.total});
    if(m.teamB===teamB)gb.push({sc:g.b,cn:g.a,tot:g.total});
  });
  
  var sa=ga.length?avg(ga.map(function(g){return g.sc})):4;
  var ca=ga.length?avg(ga.map(function(g){return g.cn})):4;
  var sb=gb.length?avg(gb.map(function(g){return g.sc})):4;
  var cb=gb.length?avg(gb.map(function(g){return g.cn})):4;
  
  var allTots=results.map(function(m){var g=parseScore(m.ftActual);return g?g.total:null}).filter(function(t){return t!==null});
  var lgAvg=allTots.length?avg(allTots):8;
  var lp=Math.max(0.5,lgAvg/2);
  
  var atkA=ga.length>=2?sa/lp:1;
  var defA=ga.length>=2?ca/lp:1;
  var atkB=gb.length>=2?sb/lp:1;
  var defB=gb.length>=2?cb/lp:1;
  
  var lamA=clamp(atkA*defB*lp*1.1,0.5,20);
  var lamB=clamp(atkB*defA*lp*0.9,0.5,20);
  
  var pois=poissonProbs(lamA,lamB,15);
  if(!pois)pois={probs:[{a:Math.round(lamA),b:Math.round(lamB),score:Math.round(lamA)+'-'+Math.round(lamB),prob:1,total:Math.round(lamA+lamB)}],homeWin:lamA>lamB?1:0,draw:lamA===lamB?1:0,awayWin:lamA<lamB?1:0,expTotal:lamA+lamB};
  
  var top=pois.probs[0];
  var ftA=top.a,ftB=top.b;
  var htA=Math.max(0,Math.round(ftA*0.45));
  var htB=Math.max(0,Math.round(ftB*0.45));
  
  var elo=getElo();
  var tmA=getT(teamA),tmB=getT(teamB);
  var cls=ftA+ftB>15?'Chaos':ftA+ftB>11?'Open':ftA+ftB>7?'Balanced':'Closed';
  
  return{
    tA:teamA,tB:teamB,
    tmA:tmA,tmB:tmB,
    ft:ftA+'-'+ftB,ht:htA+'-'+htB,
    sh:{a:ftA-htA,b:ftB-htB},
    cls:cls,
    lamA:lamA,lamB:lamB,
    wp:{h:(pois.homeWin*100).toFixed(1)+'%',d:(pois.draw*100).toFixed(1)+'%',a:(pois.awayWin*100).toFixed(1)+'%'},
    top3:pois.probs.slice(0,3).map(function(p,i){return{score:p.score,label:i===0?'Most Likely':i===1?'High Prob':'Variance',prob:p.prob}}),
    conf:ga.length>=3&&gb.length>=3?65:50,
    cr:ga.length+'/'+gb.length+' games each',
    ai:'Poisson model: '+tmA.full+' λ='+lamA.toFixed(2)+', '+tmB.full+' λ='+lamB.toFixed(2)+'. Expected '+pois.expTotal.toFixed(1)+' total goals.',
    fr:tmA.full+' ('+ga.length+'g: '+sa.toFixed(1)+'sc/'+ca.toFixed(1)+'cn) vs '+tmB.full+' ('+gb.length+'g: '+sb.toFixed(1)+'sc/'+cb.toFixed(1)+'cn). λA='+lamA.toFixed(2)+', λB='+lamB.toFixed(2)+'. Top: '+top.score+' ('+(top.prob*100).toFixed(1)+'%).',
    warn:ga.length<3||gb.length<3?'Limited data for '+(ga.length<3?teamA:'')+' '+(gb.length<3?teamB:'')+' (need 3+ games)':null,
    bet:{line:ftA+ftB>10?'Over 10.5':'Under 10.5',range:Math.max(0,ftA+ftB-2)+'–'+(ftA+ftB+2)+' goals',risk:ga.length>=3?'MEDIUM':'HIGH'}
  };
}

function runPrediction(){

  var btn=document.getElementById('predictBtn');

      var p=makePrediction(a,b);

  },100);
}

function savePrediction(){
  if(!state.lastPred)return;
  var p=state.lastPred;
  var m={
    id:id(),date:new Date().toISOString(),
    teamA:p.tA,teamB:p.tB,
    htPred:p.ht,ftPred:p.ft,
    classification:p.cls,confidence:p.conf,
    top3:p.top3.map(function(s){return s.score}).join(', '),
    primaryLine:p.bet.line,bettingRisk:p.bet.risk,safeRange:p.bet.range,
    trapWarning:p.warn||null,
    htActual:null,ftActual:null,status:'pending'
  };
  var db=loadDB();
  db.unshift(m);
  if(saveDB(db)){toast('✅ Saved!');state.lastPred=null;counters()}else{toast('Save failed')}
}

function saveResult(){
  if(!state.resultId)return;
  var a=parseInt(document.getElementById('ftA').value),b=parseInt(document.getElementById('ftB').value);
  if(isNaN(a)||isNaN(b)){toast('Enter both scores');return}
  var db=loadDB();
  var i=db.findIndex(function(m){return m.id===state.resultId});
  if(i>=0){
    db[i].ftActual=a+'-'+b;db[i].status='result';

    if(state.page==='db')renderDatabase();

      localStorage.removeItem(API_KEY);
      document.getElementById('apiKeyStatus').textContent='NO AI';
      document.getElementById('apiKeyStatus').className='badge bg';
    }
  });
})();
</script>
