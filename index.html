<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#060911">
<title>EPL 4v4 · VOLTA ENGINE v8 AUDITED</title>
<style>
:root{
  --bg:#060911;--bg2:#0b0e1b;--sur:#101422;--sur2:#151929;
  --bdr:#1c2238;--bdr2:#263050;
  --grn:#00e87a;--orn:#ff7043;--blu:#29b6f6;--yel:#ffd54f;
  --red:#ff5252;--txt:#dce4f5;--mut:#4a5878;--pur:#ab47bc;
  --fh:'Barlow Condensed',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --fb:'Inter',sans-serif;
  --nav-h:62px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--fb);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;min-height:100vh;padding-bottom:var(--nav-h)}
.page{display:none;flex:1;animation:fadeIn .2s ease}
.page.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(6,9,17,.96);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;height:var(--nav-h)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--mut);cursor:pointer;font-family:var(--fm);font-size:7px;letter-spacing:1.8px;text-transform:uppercase;transition:all .2s;position:relative}
.nav-btn.on{color:var(--grn)}
.nav-btn.on::after{content:'';position:absolute;top:0;left:30%;right:30%;height:2px;background:var(--grn);border-radius:0 0 2px 2px;box-shadow:0 0 12px rgba(0,232,122,.5)}
.nav-btn svg{width:19px;height:19px;stroke-width:1.6}

.hdr{padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10;background:var(--bg)}
.hdr-l .ht{font-family:var(--fh);font-size:32px;font-weight:900;letter-spacing:2px;line-height:1}
.hdr-l .hs{font-family:var(--fm);font-size:8px;color:var(--grn);letter-spacing:2.5px;margin-top:2px}

.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:5px;font-family:var(--fm);font-size:7.5px;letter-spacing:1px;font-weight:600;text-transform:uppercase;border:1px solid transparent;gap:4px}
.bg{background:rgba(74,88,120,.1);color:var(--mut);border-color:rgba(74,88,120,.2)}
.bg-g{background:rgba(0,232,122,.08);color:var(--grn);border-color:rgba(0,232,122,.2)}
.bg-o{background:rgba(255,112,67,.08);color:var(--orn);border-color:rgba(255,112,67,.2)}
.bg-b{background:rgba(41,182,246,.08);color:var(--blu);border-color:rgba(41,182,246,.2)}
.bg-y{background:rgba(255,213,79,.08);color:var(--yel);border-color:rgba(255,213,79,.2)}
.bg-r{background:rgba(255,82,82,.08);color:var(--red);border-color:rgba(255,82,82,.2)}
.bg-p{background:rgba(171,71,188,.08);color:var(--pur);border-color:rgba(171,71,188,.2)}

.sec{padding:14px 16px;max-width:600px;margin:0 auto;width:100%}
.sl{font-family:var(--fm);font-size:8.5px;letter-spacing:2px;color:var(--mut);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sl::after{content:'';flex:1;height:1px;background:var(--bdr)}

.api-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.api-input{flex:1;background:var(--sur2);border:1px solid var(--bdr2);border-radius:10px;padding:10px 14px;font-family:var(--fm);font-size:10px;color:var(--txt);outline:none}
.api-input:focus{border-color:var(--pur)}
.api-input::placeholder{color:var(--mut)}

.arena{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;margin-bottom:14px}
.arena-grid{display:grid;grid-template-columns:1fr 52px 1fr;align-items:center;padding:20px 16px}
.team-side{display:flex;flex-direction:column;align-items:center;gap:10px}
.team-btn{width:72px;height:72px;border-radius:16px;border:2px solid var(--bdr2);background:var(--sur2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;gap:2px}
.team-btn.sel{border-color:var(--grn);box-shadow:0 0 24px rgba(0,232,122,.12)}
.tb-emoji{font-size:26px;line-height:1}
.tb-abbr{font-family:var(--fh);font-size:10px;font-weight:700;color:var(--mut)}
.team-btn.sel .tb-abbr{color:var(--grn)}
.tn{font-family:var(--fh);font-size:14px;font-weight:700;text-align:center;max-width:100px;line-height:1.2}
.tn.placeholder{color:var(--mut);font-size:10px;font-family:var(--fm);font-weight:400}
.vs-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.vs-div{width:1px;height:20px;background:var(--bdr)}
.vs-txt{font-family:var(--fh);font-size:36px;font-weight:900;color:var(--bdr2)}

.pred-btn{width:100%;height:56px;border:none;border-radius:14px;cursor:pointer;font-family:var(--fh);font-size:24px;font-weight:900;letter-spacing:3px;background:var(--grn);color:#060911;transition:all .2s}
.pred-btn:disabled{opacity:.4;cursor:not-allowed}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:var(--fh);font-weight:700;letter-spacing:1px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-sm{padding:8px 16px;font-size:11px}
.btn-g{background:var(--grn);color:#060911}
.btn-ghost{background:var(--sur2);color:var(--txt);border:1px solid var(--bdr2)}
.btn-r{background:rgba(255,82,82,.08);color:var(--red);border:1px solid rgba(255,82,82,.2)}

.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(6,9,17,.94);backdrop-filter:blur(10px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.on{opacity:1;pointer-events:auto}
.modal-sheet{width:100%;background:var(--bg2);border-top:1px solid var(--bdr);border-radius:22px 22px 0 0;padding:20px 18px 34px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:0 auto 14px}
.modal-scores{display:grid;grid-template-columns:1fr 28px 1fr;align-items:center;gap:12px;margin-bottom:14px}
.score-input{background:var(--sur);border:1px solid var(--bdr2);border-radius:9px;padding:12px;font-family:var(--fh);font-size:28px;font-weight:900;color:var(--txt);text-align:center;outline:none;width:100%}

.sb{background:var(--bg);border:1px solid var(--bdr);border-radius:14px;padding:20px 16px;margin-bottom:12px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.sb-side{display:flex;flex-direction:column;gap:4px}
.sb-side.right{align-items:flex-end;text-align:right}
.sb-club{font-family:var(--fh);font-size:11px;color:var(--mut)}
.sb-name{font-family:var(--fh);font-size:20px;font-weight:900}
.sb-center{text-align:center}
.sb-ft{font-family:var(--fh);font-size:52px;font-weight:900;color:var(--grn);letter-spacing:-2px;line-height:1}
.sb-label{font-family:var(--fm);font-size:7px;color:var(--mut);letter-spacing:2px}
.sb-ht-info{font-family:var(--fm);font-size:10px;color:var(--mut);margin-top:4px}

.card{background:var(--sur);border:1px solid var(--bdr);border-radius:13px;margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.card-title{font-family:var(--fh);font-size:13px;font-weight:700}
.card-body{padding:14px}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--sur2);border:1px solid var(--bdr2);border-radius:10px;padding:10px 20px;font-family:var(--fm);font-size:10px;z-index:500;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}

/* === AUDIT FIX: Missing CSS classes === */
.ai-insight{background:rgba(171,71,188,.05);border:1px solid rgba(171,71,188,.2);border-radius:11px;padding:12px 14px;margin-bottom:12px}
.ai-insight-title{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--pur);letter-spacing:1px;margin-bottom:6px}
.ai-insight-text{font-size:12px;color:var(--mut);line-height:1.7}
.pending-card{background:var(--sur);border:1px solid var(--bdr);border-radius:13px;padding:14px;margin-bottom:10px}
.elo-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bdr)}
.elo-name{font-family:var(--fh);font-size:16px;font-weight:700}
.elo-rating{font-family:var(--fh);font-size:22px;font-weight:900;margin-right:8px}
.elo-change{font-family:var(--fm);font-size:9px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--sur);border:1px solid var(--bdr);border-radius:11px;padding:12px;text-align:center}
.stat-value{font-family:var(--fh);font-size:30px;font-weight:900}
.stat-label{font-family:var(--fm);font-size:7px;color:var(--mut);letter-spacing:1px;margin-top:2px}
.ou-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px;margin-bottom:14px}
.ou-box{background:var(--sur);border:1px solid var(--bdr);border-radius:9px;padding:8px 10px;text-align:center}
.history-item{background:var(--sur2);border:1px solid var(--bdr);border-radius:11px;padding:11px 14px;margin-bottom:8px}
.save-bar{display:flex;align-items:center;justify-content:space-between;background:var(--sur2);border:1px solid var(--bdr2);border-radius:13px;padding:14px;margin-top:14px}
.ft-reasoning-block{font-family:var(--fm);font-size:9px;color:var(--mut);margin-top:8px;padding:8px;background:var(--bg);border-radius:7px;line-height:1.8}

/* MODEL HEALTH */
.model-health-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.model-health-card{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:12px 10px;text-align:center}

/* POISSON GRID */
.poisson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:4px;margin-bottom:4px}
.poisson-cell{background:var(--bg);border-radius:6px;padding:6px 4px;text-align:center;border:1px solid var(--bdr)}
.poisson-cell.hot{background:rgba(0,232,122,.1);border-color:rgba(0,232,122,.3)}
.poisson-score{font-family:var(--fm);font-size:9px;color:var(--txt)}
.poisson-pct{font-family:var(--fm);font-size:7px;color:var(--grn);margin-top:2px}

/* TOP 3 */
.t3-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.t3-item{background:var(--sur2);border:1px solid var(--bdr);border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.t3-item.win{border-color:rgba(0,232,122,.2);background:rgba(0,232,122,.03)}
.t3-rank{font-size:18px;width:24px;flex-shrink:0;text-align:center}
.t3-score{font-family:var(--fh);font-size:30px;font-weight:900;flex:1}
.t3-item.win .t3-score{color:var(--grn)}
.t3-pct{font-family:var(--fm);font-size:10px;color:var(--grn);margin-top:2px}

/* WIN PROBS */
.win-prob-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px}
.win-prob-box{background:var(--bg);border-radius:8px;padding:8px;text-align:center}
.win-prob-label{font-family:var(--fm);font-size:7px;color:var(--mut);letter-spacing:1px;margin-bottom:4px}
.win-prob-value{font-family:var(--fh);font-size:20px;font-weight:900}

/* CONFIDENCE */
.conf-card{background:var(--sur2);border:1px solid var(--bdr);border-radius:13px;padding:14px;margin-bottom:12px}
.conf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.conf-pct{font-family:var(--fh);font-size:48px;font-weight:900;line-height:1}
.conf-bar-wrap{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:10px}
.conf-bar{height:100%;border-radius:3px}

/* BETTING */
.bet-card{background:var(--sur2);border:1px solid var(--bdr);border-radius:13px;padding:14px;margin-bottom:12px}
.bet-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;gap:10px}
.bet-line{font-family:var(--fh);font-size:36px;font-weight:900;line-height:1}
.bet-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.bet-item{background:var(--bg);border-radius:9px;padding:9px 10px}
.bet-item-label{font-family:var(--fm);font-size:7px;letter-spacing:1.5px;color:var(--mut);margin-bottom:5px}
.bet-item-value{font-family:var(--fm);font-size:12px;font-weight:600}

.flex{display:flex}.flex-wrap{flex-wrap:wrap}.gap-6{gap:6px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:12px}
.empty-icon{font-size:40px;opacity:.15}
.empty-text{font-family:var(--fm);font-size:10px;color:var(--mut);text-align:center}
</style>
</head>
<body>
<div id="app">

<!-- PREDICT PAGE -->
<div class="page on" id="page-predict">
  <div class="hdr">
    <div class="hdr-l"><div class="ht">EPL 4v4</div><div class="hs">ENGINE v8 · AUDITED</div></div>
    <span class="badge bg-g" id="miniBadge">0 MATCHES</span>
  </div>
  <div class="sec">
    <div class="api-row">
      <input class="api-input" id="apiKeyInput" type="password" placeholder="🔑 Anthropic API key (optional)...">
      <span id="apiKeyStatus" class="badge bg">NO AI</span>
    </div>
    <div class="arena">
      <div class="arena-grid">
        <div class="team-side">
          <button class="team-btn" id="btnA" onclick="openTeamSelect('A')">
            <span class="tb-emoji" id="emojiA">⚽</span>
            <span class="tb-abbr" id="abbrA">HOME</span>
          </button>
          <div class="tn placeholder" id="nameA">TAP TO SELECT</div>
        </div>
        <div class="vs-col"><div class="vs-div"></div><div class="vs-txt">VS</div><div class="vs-div"></div></div>
        <div class="team-side">
          <button class="team-btn" id="btnB" onclick="openTeamSelect('B')">
            <span class="tb-emoji" id="emojiB">⚽</span>
            <span class="tb-abbr" id="abbrB">AWAY</span>
          </button>
          <div class="tn placeholder" id="nameB">TAP TO SELECT</div>
        </div>
      </div>
    </div>
    <button class="pred-btn" id="predictBtn" onclick="runPrediction()">GENERATE PREDICTION</button>
  </div>
  <div class="sec" id="predictionSection" style="display:none">
    <div class="sl">ENGINE OUTPUT</div>
    <div id="predictionOutput"></div>
  </div>
</div>

<!-- RESULTS PAGE -->
<div class="page" id="page-results">
  <div class="hdr"><div class="hdr-l"><div class="ht">RESULTS</div><div class="hs">TRACKING</div></div><span class="badge bg-y" id="pendingBadge">0 PENDING</span></div>
  <div class="sec"><div class="sl">PENDING</div><div id="pendingList"></div><div class="sl">COMPLETED</div><div id="completedList"></div></div>
</div>

<!-- DATABASE PAGE -->
<div class="page" id="page-db">
  <div class="hdr"><div class="hdr-l"><div class="ht">DATABASE</div><div class="hs">INTELLIGENCE</div></div><span class="badge bg-g" id="totalBadge">0 MATCHES</span></div>
  <div class="sec">
    <div class="sl">MODEL HEALTH</div><div id="modelHealth"></div>
    <div class="sl">ELO RATINGS</div><div id="eloRankings"></div>
    <div class="sl">STATS</div><div class="stat-grid" id="globalStats"></div>
    <div class="sl">OVER / UNDER</div><div class="ou-grid" id="ouGrid"></div>
    <div class="sl">HISTORY</div><div id="historyList"></div>
  </div>
</div>

<!-- TEAM SELECT MODAL -->
<div class="modal-overlay" id="teamModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="font-family:var(--fh);font-size:22px;font-weight:700;margin-bottom:16px;text-align:center">SELECT <span id="teamModalSide">HOME</span></div>
    <div id="teamList" style="max-height:60vh;overflow-y:auto"></div>
    <button class="btn btn-ghost" style="width:100%;height:48px;margin-top:12px;font-size:15px" onclick="closeTeamModal()">CANCEL</button>
  </div>
</div>

<!-- RESULT MODAL -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="font-family:var(--fh);font-size:22px;font-weight:700;margin-bottom:4px" id="modalTitle">ENTER RESULT</div>
    <div style="font-family:var(--fm);font-size:9px;color:var(--mut);margin-bottom:16px" id="modalSubtitle"></div>
    <div class="modal-scores">
      <div><div style="font-family:var(--fm);font-size:8px;color:var(--mut);margin-bottom:4px" id="ftALabel">HOME</div><input class="score-input" type="number" id="ftA" min="0" max="99" placeholder="0"></div>
      <div style="font-family:var(--fh);font-size:24px;color:var(--mut);text-align:center">–</div>
      <div><div style="font-family:var(--fm);font-size:8px;color:var(--mut);margin-bottom:4px" id="ftBLabel">AWAY</div><input class="score-input" type="number" id="ftB" min="0" max="99" placeholder="0"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1;height:48px;font-size:15px" onclick="closeResultModal()">CANCEL</button>
      <button class="btn btn-g" style="flex:1;height:48px;font-size:15px" onclick="saveResult()">SAVE RESULT</button>
    </div>
  </div>
</div>

<nav>
  <button class="nav-btn on" id="nav-predict" onclick="switchPage('predict')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round"/></svg>PREDICT</button>
  <button class="nav-btn" id="nav-results" onclick="switchPage('results')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-linecap="round"/></svg>RESULTS</button>
  <button class="nav-btn" id="nav-db" onclick="switchPage('db')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" stroke-linecap="round"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" stroke-linecap="round"/></svg>DATABASE</button>
</nav>

<div class="toast" id="toast"></div>
</div>

<script>
// ════════════════ CORE DATA ════════════════
var TEAMS = [
  {name:'Arsenal',emoji:'🔴',color:'#EF0107',abbr:'ARS',full:'Arsenal'},
  {name:'AstonVilla',emoji:'🟣',color:'#95BFE5',abbr:'AVL',full:'Aston Villa'},
  {name:'Bournemouth',emoji:'🍒',color:'#DA291C',abbr:'BOU',full:'Bournemouth'},
  {name:'Brentford',emoji:'🐝',color:'#FFD700',abbr:'BRE',full:'Brentford'},
  {name:'Brighton',emoji:'🔵',color:'#0057B8',abbr:'BHA',full:'Brighton'},
  {name:'Burnley',emoji:'🟤',color:'#6C1D45',abbr:'BUR',full:'Burnley'},
  {name:'Chelsea',emoji:'💙',color:'#034694',abbr:'CHE',full:'Chelsea'},
  {name:'CrystalPalace',emoji:'🦅',color:'#1B458F',abbr:'CRY',full:'Crystal Palace'},
  {name:'Everton',emoji:'🔵',color:'#003399',abbr:'EVE',full:'Everton'},
  {name:'Fulham',emoji:'⚫',color:'#CC0000',abbr:'FUL',full:'Fulham'},
  {name:'Liverpool',emoji:'🔴',color:'#C8102E',abbr:'LIV',full:'Liverpool'},
  {name:'Luton',emoji:'🟠',color:'#F78F1E',abbr:'LUT',full:'Luton Town'},
  {name:'ManCity',emoji:'🩵',color:'#6CABDD',abbr:'MCI',full:'Manchester City'},
  {name:'ManUtd',emoji:'👹',color:'#DA291C',abbr:'MUN',full:'Manchester United'},
  {name:'Newcastle',emoji:'⚫',color:'#241F20',abbr:'NEW',full:'Newcastle United'},
  {name:'Nottingham',emoji:'🌳',color:'#DD0000',abbr:'NFO',full:'Nottingham Forest'},
  {name:'Sheffield',emoji:'🔴',color:'#EE2737',abbr:'SHU',full:'Sheffield United'},
  {name:'Tottenham',emoji:'⚪',color:'#132257',abbr:'TOT',full:'Tottenham Hotspur'},
  {name:'WestHam',emoji:'⚒️',color:'#7A263A',abbr:'WHU',full:'West Ham United'},
  {name:'Wolves',emoji:'🐺',color:'#FDB913',abbr:'WOL',full:'Wolverhampton Wanderers'}
];

var DB_KEY = 'epl4v4:v8:matches';
var ELO_KEY = 'epl4v4:v8:elo';
var ELO_K_KEY = 'epl4v4:v8:elok';
var API_KEY = 'epl4v4:apikey';

var state = {page:'predict',pickA:null,pickB:null,lastPred:null,resultId:null,teamSide:null};

// ════════════════ HELPERS ════════════════
function avg(a){return a.length?a.reduce(function(s,v){return s+v},0)/a.length:0}
function stdDev(a){if(a.length<2)return 0;var m=avg(a);return Math.sqrt(a.reduce(function(s,v){return s+Math.pow(v-m,2)},0)/a.length)}
function clamp(v,l,h){return Math.max(l,Math.min(h,v))}
function parseScore(s){if(!s)return null;var p=s.split('-');if(p.length!==2)return null;var a=parseInt(p[0]),b=parseInt(p[1]);if(isNaN(a)||isNaN(b))return null;return{a:a,b:b,total:a+b}}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function getT(n){var f=TEAMS.find(function(t){return t.name===n});return f||{emoji:'⚽',color:'#4a5878',abbr:'?',full:n||'Unknown'}}
function fmt(d){try{return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}catch(e){return d||'—'}}

// ════════════════ STORAGE ════════════════
function loadDB(){try{var d=localStorage.getItem(DB_KEY);return d?JSON.parse(d):[]}catch(e){return[]}}
function saveDB(db){try{localStorage.setItem(DB_KEY,JSON.stringify(db));return true}catch(e){return false}}
function loadElo(){try{var d=localStorage.getItem(ELO_KEY);return d?JSON.parse(d):{}}catch(e){return{}}}
function saveElo(e){try{localStorage.setItem(ELO_KEY,JSON.stringify(e))}catch(e){}}
function getElo(){var e=loadElo();TEAMS.forEach(function(t){if(!e[t.name])e[t.name]=1500});return e}
function getOptK(){try{return parseInt(localStorage.getItem(ELO_K_KEY))||32}catch(e){return 32}}
function saveOptK(k){localStorage.setItem(ELO_K_KEY,Math.round(k).toString())}

// ════════════════ DATA RECOVERY ════════════════
function recoverData(){
  var current=loadDB();
  var ids={};current.forEach(function(m){ids[m.id]=true});
  var recovered=0;
  var keys=['epl4v4:v7:matches','epl4v4:v6:matches','epl4v4:v5:matches','epl4v4:v4:matches','epl4v4:v3:matches','epl4v4:v2:matches','epl4v4:v1:matches','epl4v4:matches','epl4v4:results'];
  keys.forEach(function(key){
    try{var raw=localStorage.getItem(key);if(!raw)return;var data=JSON.parse(raw);if(!Array.isArray(data))return;
      data.forEach(function(m){if(!m.id)m.id=id();if(ids[m.id])return;ids[m.id]=true;if(!m.date)m.date=new Date().toISOString();if(!m.status)m.status=m.ftActual?'result':'pending';if(m.teamA){var na=normalizeName(m.teamA);if(na)m.teamA=na}if(m.teamB){var nb=normalizeName(m.teamB);if(nb)m.teamB=nb}current.push(m);recovered++});
    }catch(e){}
  });
  if(recovered>0){saveDB(current);return recovered}return 0;
}
function normalizeName(input){
  if(!input)return null;var c=input.trim();
  var found=TEAMS.find(function(t){return t.name===c||t.full===c||t.abbr===c});if(found)return found.name;
  var l=c.toLowerCase().replace(/\s+/g,'');
  found=TEAMS.find(function(t){return t.name.toLowerCase()===l||t.full.toLowerCase().replace(/\s+/g,'')===l});return found?found.name:null;
}

// ════════════════ ELO ════════════════
function backtestEloK(matches,k){
  var temp={};TEAMS.forEach(function(t){temp[t.name]=1500});var correct=0,total=0;
  var sorted=[].concat(matches).sort(function(a,b){return new Date(a.date)-new Date(b.date)});
  sorted.forEach(function(m){var g=parseScore(m.ftActual);if(!g)return;
    var ra=temp[m.teamA]||1500,rb=temp[m.teamB]||1500;var ea=1/(1+Math.pow(10,(rb-ra)/400));
    var pw=ea>0.55?'H':ea<0.45?'A':'D';var aw=g.a>g.b?'H':g.a<g.b?'A':'D';if(pw===aw)correct++;total++;
    var aa=g.a>g.b?1:g.a<g.b?0:0.5;var gd=Math.abs(g.a-g.b);var mm=Math.min(1+gd*0.15,2.5);
    temp[m.teamA]=Math.round(ra+k*mm*(aa-ea));temp[m.teamB]=Math.round(rb+k*mm*((1-aa)-(1-ea)));
  });return total>0?(correct/total)*100:0;
}
function optimizeEloK(results){if(results.length<15)return 32;var bestK=32,bestAcc=0;
  for(var k=16;k<=56;k+=4){var acc=backtestEloK(results,k);if(acc>bestAcc){bestAcc=acc;bestK=k}}saveOptK(bestK);return bestK;
}
function updateElo(a,b,sa,sb){
  var e=loadElo();var ra=e[a]||1500,rb=e[b]||1500;var ea=1/(1+Math.pow(10,(rb-ra)/400));var eb=1-ea;
  var aa=sa>sb?1:sa<sb?0:0.5;var gd=Math.abs(sa-sb);var mm=Math.min(1+gd*0.15,2.5);var K=getOptK();
  e[a]=Math.round(ra+K*mm*(aa-ea));e[b]=Math.round(rb+K*mm*((1-aa)-eb));saveElo(e);
}
function rebuildElo(){
  var e={};TEAMS.forEach(function(t){e[t.name]=1500});saveElo(e);
  var db=loadDB().filter(function(m){return m.ftActual}).reverse();
  db.forEach(function(m){var g=parseScore(m.ftActual);if(g)updateElo(m.teamA,m.teamB,g.a,g.b)});
}

// ════════════════ AUDIT FIX: Calibrate rho for 4v4 ════════════════
function calibrateRho(resultsOnly){
  if(resultsOnly.length<10)return -0.08;
  var tots=resultsOnly.map(function(m){return parseScore(m.ftActual)}).filter(Boolean);
  var lowCount=tots.filter(function(g){return g.a<=3&&g.b<=3}).length;
  return clamp(-lowCount/tots.length*0.3,-0.12,-0.02);
}

// ════════════════ POISSON ════════════════
function poissonPMF(k,lam){if(lam<=0)return k===0?1:0;if(k>25)return 0;var lp=-lam+k*Math.log(lam);for(var i=2;i<=k;i++)lp-=Math.log(i);return Math.exp(lp)}
function dixonColes(a,b,lA,lB,rho){if(a===0&&b===0)return 1-lA*lB*rho;if(a===0&&b===1)return 1+lA*rho;if(a===1&&b===0)return 1+lB*rho;if(a===1&&b===1)return 1-rho;return 1}

function poissonProbs(lamA,lamB,maxG,rho){
  maxG=maxG||18;rho=rho||-0.06;
  var probs=[],total=0,hw=0,dr=0,aw=0;
  for(var a=0;a<=maxG;a++){for(var b=0;b<=maxG;b++){
    var raw=poissonPMF(a,lamA)*poissonPMF(b,lamB);var dc=dixonColes(a,b,lamA,lamB,rho);var p=Math.max(0,raw*dc);
    if(p>1e-8){probs.push({a:a,b:b,score:a+'-'+b,prob:p,total:a+b});total+=p;if(a>b)hw+=p;else if(a===b)dr+=p;else aw+=p}
  }}
  if(total<=0)return null;probs.forEach(function(p){p.prob/=total});probs.sort(function(a,b){return b.prob-a.prob});
  return{probs:probs.slice(0,15),homeWin:hw/total,draw:dr/total,awayWin:aw/total,expTotal:probs.reduce(function(s,p){return s+p.total*p.prob},0)};
}

// ════════════════ AUDIT FIX: buildTeamProfile with trend + streak direction ════════════════
function buildTeamProfile(teamName,allMatches){
  var wr=allMatches.filter(function(m){return m.ftActual});
  var scored=[],conceded=[],totals=[],allScores=[],htRatios=[];
  wr.forEach(function(m){var g=parseScore(m.ftActual);if(!g)return;var ht=parseScore(m.htActual);
    if(m.teamA===teamName){scored.push(g.a);conceded.push(g.b);totals.push(g.total);allScores.push({s:g.a,c:g.b,date:m.date});if(ht&&g.total>0)htRatios.push(ht.total/g.total)}
    if(m.teamB===teamName){scored.push(g.b);conceded.push(g.a);totals.push(g.total);allScores.push({s:g.b,c:g.a,date:m.date});if(ht&&g.total>0)htRatios.push(ht.total/g.total)}
  });
  var n=scored.length;
  if(!n)return{games:0,avgScored:0,avgConceded:0,avgTotal:0,stdScored:0,stdConceded:0,cvScored:1,cvConceded:1,attack:'medium',defense:'medium weakness',style:'balanced',trend:'→ stable',consistency:'unknown',defReliability:'unknown',formMult:1,defFormMult:1,htRatio:0.45,streak:0,streakType:null,streakMult:1,recentAvg:0,recentCn:0};
  var as=avg(scored),ac=avg(conceded),at=avg(totals),ss=stdDev(scored),sc=stdDev(conceded);
  var cvSc=as>0?ss/as:1,cvCn=ac>0?sc/ac:1;
  var attack=as>=5?'elite':as>=3.5?'high':as>=2?'medium':'low';
  var defense=ac>=5?'high weakness':ac>=3?'medium weakness':'low weakness';
  var style=ss>2.5?'chaotic':ss>1.5?'aggressive':'balanced';
  // AUDIT FIX: properly compute trend
  var recentSc3=allScores.slice(-3).map(function(s){return s.s});
  var olderSc3=allScores.slice(-7,-3).map(function(s){return s.s});
  var trend=olderSc3.length>=2?(avg(recentSc3)>avg(olderSc3)+0.5?'↑ rising':avg(recentSc3)<avg(olderSc3)-0.5?'↓ falling':'→ stable'):'→ stable';
  var consistency=cvSc<0.3?'consistent':cvSc<0.6?'moderate':'volatile';
  var defReliability=cvCn<0.3?'high':cvCn<0.6?'medium':'low';
  var streak=0,streakType=null;var recent=allScores.slice(-5);
  for(var i=recent.length-1;i>=0;i--){var r=recent[i],result=r.s>r.c?'W':r.s<r.c?'L':'D';if(!streakType)streakType=result;if(result===streakType)streak++;else break}
  var last5=allScores.slice(-5);var recentAvg=last5.length?avg(last5.map(function(s){return s.s})):as;
  var recentCn=last5.length?avg(last5.map(function(s){return s.c})):ac;
  // AUDIT FIX: streak direction
  var streakMult=streakType==='W'&&streak>=3?1.15:streakType==='W'&&streak>=2?1.07:streakType==='L'&&streak>=3?0.85:streakType==='L'&&streak>=2?0.93:1;
  return{games:n,avgScored:as,avgConceded:ac,avgTotal:at,stdScored:ss,stdConceded:sc,cvScored:cvSc,cvConceded:cvCn,attack:attack,defense:defense,style:style,trend:trend,consistency:consistency,defReliability:defReliability,formMult:recentAvg>as+.5?1.1:recentAvg<as-.5?0.9:1,defFormMult:recentCn>ac+.5?1.1:recentCn<ac-.5?0.9:1,streak:streak,streakType:streakType,streakMult:streakMult,htRatio:htRatios.length?avg(htRatios):0.45,recentAvg:recentAvg,recentCn:recentCn};
}

// ════════════════ AUDIT FIX: Weighted H2H with venue ════════════════
function getWeightedH2H(tA,tB,allMatches){
  var raw=allMatches.filter(function(m){return m.ftActual&&((m.teamA===tA&&m.teamB===tB)||(m.teamA===tB&&m.teamB===tA))}).map(function(m){
    var g=parseScore(m.ftActual);if(!g)return null;var days=(Date.now()-new Date(m.date||Date.now()).getTime())/(86400000);
    var w=Math.exp(-Math.log(2)*days/21);var venueMatch=m.teamA===tA;w*=venueMatch?1.4:0.7;return{a:g.a,b:g.b,total:g.total,weight:w,date:m.date};
  }).filter(Boolean);
  if(!raw.length)return{matches:[],weightedAvgTotal:0,count:0,totalWeight:0};
  var tw=raw.reduce(function(s,h){return s+h.weight},0);
  return{matches:raw,weightedAvgTotal:tw>0?raw.reduce(function(s,h){return s+h.total*h.weight},0)/tw:0,count:raw.length,totalWeight:tw};
}

// ════════════════ AUDIT FIX: computeBlendedLambdas ════════════════
function computeBlendedLambdas(pA,pB,splitA,splitB,eloA,eloB,gAvg,teamAvgA,teamAvgB){
  // AUDIT FIX: leaguePer no longer double-halved
  var leaguePerA=Math.max(0.5,teamAvgA||(gAvg/2));
  var leaguePerB=Math.max(0.5,teamAvgB||(gAvg/2));
  // AUDIT FIX: Bayesian shrinkage to mean
  var shrinkA=Math.min(pA.games/8,1);var shrinkB=Math.min(pB.games/8,1);
  var rawAtkA=pA.games>=3?pA.avgScored:leaguePerA;var rawAtkB=pB.games>=3?pB.avgScored:leaguePerB;
  var blendedAtkA=rawAtkA*shrinkA+leaguePerA*(1-shrinkA);var blendedAtkB=rawAtkB*shrinkB+leaguePerB*(1-shrinkB);
  var rawDefA=pA.games>=3?pA.avgConceded:leaguePerA;var rawDefB=pB.games>=3?pB.avgConceded:leaguePerB;
  var blendedDefA=rawDefA*shrinkA+leaguePerA*(1-shrinkA);var blendedDefB=rawDefB*shrinkB+leaguePerB*(1-shrinkB);
  var atkStrA=blendedAtkA/leaguePerA;var defStrA=blendedDefA/leaguePerA;
  var atkStrB=blendedAtkB/leaguePerB;var defStrB=blendedDefB/leaguePerB;
  var homeAtkA=splitA.homeGames>=2?splitA.homeAvgScored/leaguePerA:atkStrA;
  var awayAtkB=splitB.awayGames>=2?splitB.awayAvgScored/leaguePerB:atkStrB;
  var homeDefA=splitA.homeGames>=2?splitA.homeAvgConceded/leaguePerA:defStrA;
  var awayDefB=splitB.awayGames>=2?splitB.awayAvgConceded/leaguePerB:defStrB;
  var statLamA=clamp(homeAtkA*awayDefB*leaguePerA*pA.formMult*pA.streakMult,0.5,25);
  var statLamB=clamp(awayAtkB*homeDefA*leaguePerB*pB.formMult*pB.streakMult,0.5,25);
  var eloDiff=eloA-eloB;var eloExpA=1/(1+Math.pow(10,-eloDiff/400));
  var eloLamA=(teamAvgA||gAvg)*(0.5+(eloExpA-0.5)*0.6);var eloLamB=(teamAvgB||gAvg)-eloLamA;
  var dataWeight=clamp((pA.games+pB.games)/20,0.1,0.8);var eloWeight=1-dataWeight;
  return{lA:clamp(statLamA*dataWeight+eloLamA*eloWeight,0.3,25),lB:clamp(statLamB*dataWeight+eloLamB*eloWeight,0.3,25),dataWeight:dataWeight,eloWeight:eloWeight};
}

// ════════════════ HOME/AWAY SPLIT ════════════════
function buildSplitProfile(teamName,allMatches){
  var hs=[],hc=[],as=[],ac=[];allMatches.filter(function(m){return m.ftActual}).forEach(function(m){var g=parseScore(m.ftActual);if(!g)return;if(m.teamA===teamName){hs.push(g.a);hc.push(g.b)}if(m.teamB===teamName){as.push(g.b);ac.push(g.a)}});
  return{homeAvgScored:hs.length?avg(hs):0,homeAvgConceded:hc.length?avg(hc):0,awayAvgScored:as.length?avg(as):0,awayAvgConceded:ac.length?avg(ac):0,homeGames:hs.length,awayGames:as.length,homeAdvantage:(hs.length&&as.length)?avg(hs)-avg(as):0};
}
function computeTeamSpecificAvg(teamName,resultsOnly){
  var g=resultsOnly.filter(function(m){var g=parseScore(m.ftActual);return g&&(m.teamA===teamName||m.teamB===teamName)}).map(function(m){return parseScore(m.ftActual).total});
  return g.length>=3?avg(g):null;
}

// ════════════════ PREDICTION ════════════════
function makePrediction(teamA,teamB){
  var db=loadDB();var resultsOnly=db.filter(function(m){return m.ftActual});
  var pA=buildTeamProfile(teamA,db);var pB=buildTeamProfile(teamB,db);
  var splitA=buildSplitProfile(teamA,db);var splitB=buildSplitProfile(teamB,db);
  var h2hData=getWeightedH2H(teamA,teamB,db);var h2h=h2hData.matches;
  var allTots=resultsOnly.map(function(m){var g=parseScore(m.ftActual);return g?g.total:null}).filter(function(t){return t!==null});
  var gAvg=allTots.length?avg(allTots):8;
  var teamAvgA=computeTeamSpecificAvg(teamA,resultsOnly);var teamAvgB=computeTeamSpecificAvg(teamB,resultsOnly);
  var eloAll=getElo();var eloA=eloAll[teamA]||1500;var eloB=eloAll[teamB]||1500;
  var lambdas=computeBlendedLambdas(pA,pB,splitA,splitB,eloA,eloB,gAvg,teamAvgA,teamAvgB);
  var rho=calibrateRho(resultsOnly);
  var pois=poissonProbs(lambdas.lA,lambdas.lB,18,rho);
  if(!pois)pois={probs:[{a:Math.round(lambdas.lA),b:Math.round(lambdas.lB),score:Math.round(lambdas.lA)+'-'+Math.round(lambdas.lB),prob:1,total:Math.round(lambdas.lA+lambdas.lB)}],homeWin:lambdas.lA>lambdas.lB?1:0,draw:lambdas.lA===lambdas.lB?1:0,awayWin:lambdas.lA<lambdas.lB?1:0,expTotal:lambdas.lA+lambdas.lB};
  var top=pois.probs[0];var ftA=top.a,ftB=top.b;
  if(h2h.length){var wgt=h2h.length>=6?0.5:h2h.length>=3?0.4:0.3;var bt=pois.expTotal*(1-wgt)+h2hData.weightedAvgTotal*wgt;var r=clamp(bt/Math.max(0.1,pois.expTotal),0.7,1.3);ftA=Math.round(top.a*r);ftB=Math.round(top.b*r)}
  var hm=((pA.htRatio||0.45)+(pB.htRatio||0.45))/2;var htA=Math.round(ftA*hm),htB=Math.round(ftB*hm);
  var tmA=getT(teamA),tmB=getT(teamB);var cls=ftA+ftB>15?'Chaos':ftA+ftB>11?'Open':ftA+ftB>7?'Balanced':'Closed';var K=getOptK();
  return{
    tA:teamA,tB:teamB,tmA:tmA,tmB:tmB,ft:ftA+'-'+ftB,ht:htA+'-'+htB,sh:{a:Math.max(0,ftA-htA),b:Math.max(0,ftB-htB)},cls:cls,lamA:lambdas.lA,lamB:lambdas.lB,
    wp:{h:(pois.homeWin*100).toFixed(1)+'%',d:(pois.draw*100).toFixed(1)+'%',a:(pois.awayWin*100).toFixed(1)+'%'},
    top3:pois.probs.slice(0,3).map(function(p,i){return{score:p.score,label:i===0?'Most Likely':i===1?'High Prob':'Variance',prob:p.prob}}),
    poisProbs:pois.probs.slice(0,12),conf:pA.games>=3&&pB.games>=3?65:50,cr:pA.games+'/'+pB.games+' games each',
    ai:'DC Poisson ρ='+rho.toFixed(3)+': '+tmA.full+' λ='+lambdas.lA.toFixed(2)+', '+tmB.full+' λ='+lambdas.lB.toFixed(2)+'. Expected '+pois.expTotal.toFixed(1)+' total. Elo K='+K+'.',
    fr:'['+tmA.full+' ('+pA.games+'g: '+pA.avgScored.toFixed(1)+'sc/'+pA.avgConceded.toFixed(1)+'cn, '+pA.trend+') vs '+tmB.full+' ('+pB.games+'g: '+pB.avgScored.toFixed(1)+'sc/'+pB.avgConceded.toFixed(1)+'cn, '+pB.trend+')] DC ρ='+rho.toFixed(3)+'. λA='+lambdas.lA.toFixed(2)+', λB='+lambdas.lB.toFixed(2)+'. Top: '+top.score+' ('+(top.prob*100).toFixed(1)+'%). H2H: '+h2h.length+' weighted.',
    warn:pA.games<3||pB.games<3?'Limited data: '+teamA+' ('+pA.games+'g), '+teamB+' ('+pB.games+'g). Shrinkage applied.':null,
    bet:{line:ftA+ftB>10?'Over 10.5':'Under 10.5',range:Math.max(0,ftA+ftB-2)+'–'+(ftA+ftB+2)+' goals',risk:pA.games>=3?'MEDIUM':'HIGH'},
    _pA:pA,_pB:pB,_splitA:splitA,_splitB:splitB,_h2h:h2hData,_pois:pois,_lambdas:lambdas,_gAvg:gAvg,_eloA:eloA,_eloB:eloB,_rho:rho,_optK:K
  };
}

// ════════════════ UI ACTIONS ════════════════
function runPrediction(){
  var a=state.pickA,b=state.pickB;if(!a||!b){toast('Select both teams');return}
  var btn=document.getElementById('predictBtn');btn.disabled=true;btn.textContent='COMPUTING...';
  setTimeout(function(){try{var p=makePrediction(a,b);state.lastPred=p;document.getElementById('predictionSection').style.display='block';renderPrediction(p);document.getElementById('predictionOutput').scrollIntoView({behavior:'smooth'})}catch(e){toast('Error: '+e.message);console.error(e)}btn.disabled=false;btn.textContent='GENERATE PREDICTION'},100);
}

function renderPrediction(p){
  var clsCol=p.cls==='Chaos'?'#ff5252':p.cls==='Open'?'#ff7043':p.cls==='Balanced'?'#ffd54f':'#29b6f6';
  var confCol=p.conf>=70?'#00e87a':p.conf>=50?'#ffd54f':'#ff7043';
  var h='';
  h+='<div class="sb"><div class="sb-side"><div class="sb-club" style="color:'+p.tmA.color+'">'+p.tmA.emoji+' '+p.tmA.abbr+'</div><div class="sb-name">'+p.tmA.full+'</div></div><div class="sb-center"><div class="sb-ft">'+p.ft+'</div><div class="sb-label">PREDICTED FT</div><div class="sb-ht-info">HT: '+p.ht+' · 2H: '+p.sh.a+'-'+p.sh.b+'</div></div><div class="sb-side right"><div class="sb-club" style="color:'+p.tmB.color+'">'+p.tmB.emoji+' '+p.tmB.abbr+'</div><div class="sb-name">'+p.tmB.full+'</div></div></div>';
  h+='<div class="win-prob-row" style="margin-bottom:12px"><div class="win-prob-box"><div class="win-prob-label">HOME WIN</div><div class="win-prob-value" style="color:#00e87a">'+p.wp.h+'</div></div><div class="win-prob-box"><div class="win-prob-label">DRAW</div><div class="win-prob-value" style="color:#ffd54f">'+p.wp.d+'</div></div><div class="win-prob-box"><div class="win-prob-label">AWAY WIN</div><div class="win-prob-value" style="color:#ff7043">'+p.wp.a+'</div></div></div>';
  h+='<div class="ai-insight"><div class="ai-insight-title">🧠 SYNTHESIS</div><div class="ai-insight-text">'+p.ai+'</div></div>';
  h+='<div class="card"><div class="card-head"><div class="card-title" style="color:'+clsCol+'">'+p.cls.toUpperCase()+' MATCH</div><span class="badge '+(p.cls==='Chaos'?'bg-r':p.cls==='Open'?'bg-o':p.cls==='Balanced'?'bg-y':'bg-b')+'">'+(p.ft.split('-')[0]*1+p.ft.split('-')[1]*1)+' GOALS</span></div><div class="card-body"><div style="font-size:12px;color:var(--mut);line-height:1.7">λA='+p.lamA.toFixed(2)+', λB='+p.lamB.toFixed(2)+' | ρ='+((p._rho||0).toFixed(3))+' | Elo K='+(p._optK||32)+'</div><div class="ft-reasoning-block">'+p.fr+'</div></div></div>';
  h+='<div class="card"><div class="card-head"><div class="card-title">DC POISSON</div><span class="badge bg-b">ρ='+((p._rho||0).toFixed(3))+'</span></div><div class="card-body"><div class="poisson-grid">'+(p.poisProbs||[]).map(function(pp){return'<div class="poisson-cell'+(pp.prob>0.05?' hot':'')+'"><div class="poisson-score">'+pp.score+'</div><div class="poisson-pct">'+(pp.prob*100).toFixed(1)+'%</div></div>'}).join('')+'</div></div></div>';
  h+='<div class="card"><div class="card-head"><div class="card-title">TOP 3 SCORELINES</div></div><div class="card-body"><div class="t3-list">'+p.top3.map(function(s,i){return'<div class="t3-item'+(i===0?' win':'')+'"><div class="t3-rank">'+['🥇','🥈','🥉'][i]+'</div><div class="t3-score">'+s.score+'</div><div style="text-align:right"><span class="badge '+(i===0?'bg-g':i===1?'bg-y':'bg')+'">'+s.label+'</span><div class="t3-pct">'+(s.prob*100).toFixed(1)+'%</div></div></div>'}).join('')+'</div></div></div>';
  if(p.warn)h+='<div style="background:rgba(255,82,82,.05);border:1px solid rgba(255,82,82,.2);border-radius:11px;padding:12px 14px;margin-bottom:12px"><div style="font-family:var(--fh);font-size:17px;font-weight:700;color:#ff5252;margin-bottom:4px">⚠️ WARNING</div><div style="font-size:12px;color:rgba(255,82,82,.75)">'+p.warn+'</div></div>';
  h+='<div class="conf-card"><div class="conf-header"><div><div style="font-family:var(--fm);font-size:7px;color:var(--mut);margin-bottom:4px">CONFIDENCE</div><div class="conf-pct" style="color:'+confCol+'">'+p.conf+'%</div></div></div><div class="conf-bar-wrap"><div class="conf-bar" style="width:'+p.conf+'%;background:'+confCol+'"></div></div><div style="font-size:12px;color:var(--mut);margin-top:10px">Based on '+p.cr+'</div></div>';
  h+='<div class="save-bar"><div><div style="font-family:var(--fh);font-size:14px;font-weight:700">SAVE PREDICTION</div><div style="font-family:var(--fm);font-size:7.5px;color:var(--mut)">UPDATES ELO WHEN RESULT ENTERED</div></div><button class="btn btn-g btn-sm" onclick="savePrediction()">SAVE</button></div>';
  document.getElementById('predictionOutput').innerHTML=h;
}

function savePrediction(){
  if(!state.lastPred)return;var p=state.lastPred;
  var m={id:id(),date:new Date().toISOString(),teamA:p.tA,teamB:p.tB,htPred:p.ht,ftPred:p.ft,classification:p.cls,confidence:p.conf,top3:p.top3.map(function(s){return s.score}).join(', '),primaryLine:p.bet.line,bettingRisk:p.bet.risk,safeRange:p.bet.range,trapWarning:p.warn||null,htActual:null,ftActual:null,status:'pending',_winProbs:JSON.stringify(p.wp),_rho:p._rho,_optimalK:p._optK};
  var db=loadDB();db.unshift(m);if(saveDB(db)){toast('✅ Saved!');state.lastPred=null;counters()}else{toast('Save failed')}
}

// ════════════════ TEAM SELECT ════════════════
function openTeamSelect(side){state.teamSide=side;document.getElementById('teamModalSide').textContent=side==='A'?'HOME':'AWAY';var h='';TEAMS.forEach(function(t){var sel=state[side==='A'?'pickA':'pickB']===t.name;h+='<div onclick="selectTeam(\''+t.name+'\')" style="display:flex;align-items:center;gap:14px;padding:14px;border-bottom:1px solid var(--bdr);cursor:pointer;'+(sel?'background:rgba(0,232,122,.05)':'')+'"><div style="width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bdr2);font-size:20px">'+t.emoji+'</div><div><div style="font-family:var(--fh);font-size:18px;font-weight:700">'+t.full+'</div><div style="font-family:var(--fm);font-size:8px;color:var(--mut)">'+t.abbr+'</div></div></div>'});document.getElementById('teamList').innerHTML=h;document.getElementById('teamModal').classList.add('on')}
function closeTeamModal(){document.getElementById('teamModal').classList.remove('on')}
function selectTeam(name){var side=state.teamSide;var other=side==='A'?'B':'A';if(state[other==='A'?'pickA':'pickB']===name){toast('Same team! Choose different.');return}state[side==='A'?'pickA':'pickB']=name;updateTeamBtn(side);closeTeamModal()}
function updateTeamBtn(side){var t=TEAMS.find(function(x){return x.name===state[side==='A'?'pickA':'pickB']});if(!t)return;var btn=document.getElementById('btn'+side);btn.classList.add('sel');btn.style.backgroundColor=t.color+'18';btn.style.borderColor=t.color;document.getElementById('emoji'+side).textContent=t.emoji;document.getElementById('abbr'+side).textContent=t.abbr;document.getElementById('abbr'+side).style.color=t.color;document.getElementById('name'+side).textContent=t.full;document.getElementById('name'+side).classList.remove('placeholder')}

// ════════════════ RESULT MODAL ════════════════
function openResultModal(id){var db=loadDB(),m=db.find(function(x){return x.id===id});if(!m)return;state.resultId=id;var a=getT(m.teamA),b=getT(m.teamB);document.getElementById('modalTitle').textContent=a.full+' vs '+b.full;document.getElementById('modalSubtitle').textContent='Predicted: '+(m.ftPred||'?');document.getElementById('ftALabel').textContent=a.full;document.getElementById('ftBLabel').textContent=b.full;document.getElementById('ftA').value='';document.getElementById('ftB').value='';document.getElementById('resultModal').classList.add('on')}
function closeResultModal(){document.getElementById('resultModal').classList.remove('on');state.resultId=null}
function saveResult(){if(!state.resultId)return;var a=parseInt(document.getElementById('ftA').value),b=parseInt(document.getElementById('ftB').value);if(isNaN(a)||isNaN(b)){toast('Enter both scores');return}var db=loadDB();var i=db.findIndex(function(m){return m.id===state.resultId});if(i>=0){db[i].ftActual=a+'-'+b;db[i].status='result';saveDB(db);updateElo(db[i].teamA,db[i].teamB,a,b);toast('✅ Result saved!');closeResultModal();var ro=loadDB().filter(function(m){return m.ftActual});if(ro.length>=15)setTimeout(function(){optimizeEloK(ro);rebuildElo()},150);if(state.page==='results')renderResults();if(state.page==='db')renderDatabase();counters()}}

// ════════════════ PAGES ════════════════
function switchPage(p){document.querySelectorAll('.page').forEach(function(el){el.classList.remove('on')});document.querySelectorAll('.nav-btn').forEach(function(el){el.classList.remove('on')});document.getElementById('page-'+p).classList.add('on');document.getElementById('nav-'+p).classList.add('on');state.page=p;if(p==='results')renderResults();if(p==='db')renderDatabase()}
function renderResults(){
  var db=loadDB();var pend=db.filter(function(m){return m.status==='pending'||(!m.ftActual&&m.status!=='result')});var done=db.filter(function(m){return m.status==='result'||m.ftActual}).slice(0,50);
  document.getElementById('pendingBadge').textContent=pend.length+' PENDING';
  document.getElementById('pendingList').innerHTML=pend.length?pend.map(function(m){var a=getT(m.teamA),b=getT(m.teamB);return'<div class="pending-card"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="font-family:var(--fh);font-size:19px;font-weight:900">'+a.full+' vs '+b.full+'</span><span class="badge bg-y">PENDING</span></div><div class="flex gap-6" style="margin-bottom:10px"><span class="badge bg">FT: '+(m.ftPred||'?')+'</span></div><div style="font-size:9px;color:var(--mut);margin-bottom:10px">'+fmt(m.date)+'</div><div class="flex gap-6"><button class="btn btn-g btn-sm" onclick="openResultModal(\''+m.id+'\')">ENTER RESULT</button><button class="btn btn-ghost btn-sm" onclick="delMatch(\''+m.id+'\')">DELETE</button></div></div>'}).join(''):'<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">NO PENDING</div></div>';
  document.getElementById('completedList').innerHTML=done.length?done.map(function(m){var a=getT(m.teamA),b=getT(m.teamB);return'<div class="history-item"><div style="font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:6px">'+a.full+' vs '+b.full+'</div><div class="flex gap-6" style="margin-bottom:6px"><span style="font-size:9.5px"><span style="color:var(--mut)">PRED </span>'+(m.ftPred||'?')+'</span><span style="font-size:9.5px"><span style="color:var(--mut)">ACT </span><span style="color:#00e87a">'+(m.ftActual||'?')+'</span></span></div><div class="flex gap-6"><span style="font-size:8px;color:var(--mut)">'+fmt(m.date)+'</span><button class="btn btn-r btn-sm" style="padding:3px 8px;font-size:8px" onclick="delMatch(\''+m.id+'\')">✕</button></div></div>'}).join(''):'<div class="empty-state"><div class="empty-icon">🏁</div><div class="empty-text">NO RESULTS</div></div>';
}
function renderDatabase(){
  var db=loadDB();var wr=db.filter(function(m){return m.ftActual});var elo=getElo();var sorted=Object.keys(elo).sort(function(a,b){return elo[b]-elo[a]});
  var tots=wr.map(function(m){var g=parseScore(m.ftActual);return g?g.total:null}).filter(function(t){return t!==null});
  var gAvg=tots.length?avg(tots):null;var K=getOptK();var rho=calibrateRho(wr);
  document.getElementById('totalBadge').textContent=db.length+' MATCHES';
  // Model health
  document.getElementById('modelHealth').innerHTML='<div class="model-health-grid"><div class="model-health-card"><div style="font-family:var(--fm);font-size:7px;color:var(--mut);margin-bottom:4px">ELO K</div><div style="font-family:var(--fh);font-size:28px;font-weight:900;color:#00e87a">'+K+'</div></div><div class="model-health-card"><div style="font-family:var(--fm);font-size:7px;color:var(--mut);margin-bottom:4px">DC ρ</div><div style="font-family:var(--fh);font-size:28px;font-weight:900;color:'+(Math.abs(rho)<0.05?'#00e87a':'#ffd54f')+'">'+rho.toFixed(3)+'</div></div><div class="model-health-card"><div style="font-family:var(--fm);font-size:7px;color:var(--mut);margin-bottom:4px">MATCHES</div><div style="font-family:var(--fh);font-size:28px;font-weight:900;color:#29b6f6">'+db.length+'</div></div></div>';
  // ELO
  document.getElementById('eloRankings').innerHTML=sorted.map(function(n,i){var t=getT(n),r=elo[n],c=r-1500;return'<div class="elo-row"><div style="display:flex;align-items:center;gap:8px"><span style="font-family:var(--fm);font-size:10px;color:var(--mut);width:20px">#'+(i+1)+'</span><span class="elo-name">'+t.emoji+' '+t.full+'</span></div><div><span class="elo-rating" style="color:'+(r>1500?'#00e87a':r<1500?'#ff5252':'#4a5878')+'">'+r+'</span><span class="elo-change" style="color:'+(c>0?'#00e87a':c<0?'#ff5252':'#4a5878')+'">'+(c>0?'+'+c:c||'NEW')+'</span></div></div>'}).join('')||'<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">NO DATA</div></div>';
  // Stats
  document.getElementById('globalStats').innerHTML='<div class="stat-card"><div class="stat-value">'+db.length+'</div><div class="stat-label">TOTAL</div></div><div class="stat-card"><div class="stat-value" style="color:#00e87a">'+wr.length+'</div><div class="stat-label">RESULTS</div></div><div class="stat-card"><div class="stat-value" style="color:#ffd54f">'+(gAvg?gAvg.toFixed(1):'—')+'</div><div class="stat-label">AVG GOALS</div></div><div class="stat-card"><div class="stat-value" style="color:#29b6f6">'+(wr.length?'—':'—')+'</div><div class="stat-label">ACCURACY</div></div>';
  // O/U
  document.getElementById('ouGrid').innerHTML=[6.5,7.5,8.5,9.5,10.5,11.5,12.5,13.5,14.5,15.5,16.5,17.5,18.5].map(function(l){var h=tots.filter(function(t){return t>l}).length,p=tots.length?Math.round(h/tots.length*100):null,up=p!==null?100-p:null;return'<div class="ou-box"><div style="font-family:var(--fm);font-size:7px;color:#00e87a">OVR '+l+'</div><div style="font-family:var(--fh);font-size:20px;font-weight:700;color:'+(p===null?'#4a5878':p>=65?'#00e87a':p>=50?'#ffd54f':'#ff5252')+'">'+(p!==null?p+'%':'—')+'</div><div style="height:1px;background:var(--bdr);margin:4px 0"></div><div style="font-family:var(--fm);font-size:7px;color:#29b6f6">UND '+l+'</div><div style="font-family:var(--fh);font-size:20px;font-weight:700;color:'+(up===null?'#4a5878':up>=65?'#00e87a':up>=50?'#ffd54f':'#ff5252')+'">'+(up!==null?up+'%':'—')+'</div></div>'}).join('');
  // History
  document.getElementById('historyList').innerHTML=db.slice(0,30).map(function(m){var a=getT(m.teamA),b=getT(m.teamB);return'<div class="history-item"><div style="font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:6px">'+a.full+' vs '+b.full+'</div><div class="flex gap-6"><span style="font-size:9.5px"><span style="color:var(--mut)">PRED </span>'+(m.ftPred||'?')+'</span>'+(m.ftActual?'<span style="font-size:9.5px"><span style="color:var(--mut)">ACT </span><span style="color:#00e87a">'+m.ftActual+'</span></span>':'')+'<span style="font-size:8px;color:var(--mut)">'+fmt(m.date)+'</span></div></div>'}).join('')||'<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-text">NO HISTORY</div></div>';
}
function delMatch(id){if(!confirm('Delete this match?'))return;var db=loadDB().filter(function(m){return m.id!==id});saveDB(db);rebuildElo();toast('Deleted');if(state.page==='results')renderResults();if(state.page==='db')renderDatabase();counters()}

// ════════════════ UTILS ════════════════
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('on')},2500)}
function counters(){var db=loadDB();var p=db.filter(function(m){return m.status==='pending'||(!m.ftActual&&m.status!=='result')}).length;document.getElementById('pendingBadge').textContent=p+' PENDING';document.getElementById('totalBadge').textContent=db.length+' MATCHES';document.getElementById('miniBadge').textContent=db.length+' MATCHES'}

// ════════════════ INIT ════════════════
(function(){
  var rec=recoverData();if(rec>0){console.log('Recovered '+rec+' matches');toast('📦 Recovered '+rec+' matches!')}
  rebuildElo();
  var ro=loadDB().filter(function(m){return m.ftActual});
  if(ro.length>=15){var ok=optimizeEloK(ro);rebuildElo();console.log('Optimal Elo K:',ok)}
  counters();
  var key=localStorage.getItem(API_KEY);
  if(key){document.getElementById('apiKeyInput').placeholder='🔑 API key saved';document.getElementById('apiKeyStatus').textContent='🧠 AI ON';document.getElementById('apiKeyStatus').className='badge bg-p'}
  document.getElementById('apiKeyInput').addEventListener('input',function(){var v=this.value.trim();if(v.startsWith('sk-ant-')){localStorage.setItem(API_KEY,v);document.getElementById('apiKeyStatus').textContent='🧠 AI ON';document.getElementById('apiKeyStatus').className='badge bg-p'}else if(!v){localStorage.removeItem(API_KEY);document.getElementById('apiKeyStatus').textContent='NO AI';document.getElementById('apiKeyStatus').className='badge bg'}});
})();
</script>
</body>
</html>
